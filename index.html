<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1B2A4A">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-180.png">
<title>わが家の家計簿</title>
<style>
:root{
  --ink:#1B2A4A; --bg:#F4F6F3; --surface:#FFFFFF; --line:#E3E6E0;
  --expense:#BF4E3C; --income:#2E7D5B; --muted:#8A8F98; --transfer:#9AA0A6;
  --accent:#1B2A4A;
  --radius:14px;
  --basefs:16px;
}
/* 文字サイズ(老眼対策): 標準16 / 大21 / 特大26.5 */
body.fs-large{--basefs:21px;}
body.fs-xlarge{--basefs:26.5px;}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  font-size:var(--basefs,16px); line-height:1.6;}
body{padding-bottom:calc(64px + env(safe-area-inset-bottom));}
.num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}
header.app{position:sticky;top:0;z-index:10;background:var(--bg);
  padding:calc(10px + env(safe-area-inset-top)) 16px 8px;
  display:flex;align-items:baseline;justify-content:space-between;}
header.app h1{font-size:1.0625rem;margin:0;font-weight:700;letter-spacing:.04em;}
header.app .sub{font-size:0.75rem;color:var(--muted);}
main{padding:0 14px 24px;max-width:680px;margin:0 auto;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:12px;}
.card h2{font-size:0.8125rem;color:var(--muted);font-weight:600;margin:0 0 8px;letter-spacing:.06em;}
/* 月ナビ */
.monthnav{display:flex;align-items:center;justify-content:center;gap:18px;margin:6px 0 12px;}
.monthnav button{border:1px solid var(--line);background:var(--surface);border-radius:10px;
  width:38px;height:38px;font-size:1.125rem;color:var(--ink);}
.monthnav .label{font-size:1.1875rem;font-weight:700;min-width:140px;text-align:center;letter-spacing:.03em;}
.monthnav .label.tappable{cursor:pointer;border-radius:8px;padding:2px 10px;}
.monthnav .label.tappable:active{background:var(--surface);}
.monthnav select.navsel{font-size:1.1875rem;font-weight:700;text-align:center;text-align-last:center;
  border:none;background:transparent;color:var(--ink);letter-spacing:.03em;
  -webkit-appearance:none;appearance:none;padding:2px 8px;min-width:150px;}
.segwrap{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:4px;margin:0 0 10px;}
.seg{flex:1;padding:8px 0;border:none;background:transparent;border-radius:7px;font:inherit;font-size:0.875rem;font-weight:600;color:var(--muted);}
.seg.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.rangesel{font-size:0.9375rem !important;min-width:118px;}
.fssel{display:flex;gap:8px;margin:10px 0;}
.fsbtn{flex:1;padding:14px 0;border:2px solid var(--line);border-radius:12px;background:var(--surface);font:inherit;font-weight:700;color:var(--ink);}
.fsbtn:nth-child(1){font-size:0.9rem;}
.fsbtn:nth-child(2){font-size:1.15rem;}
.fsbtn:nth-child(3){font-size:1.4rem;}
.fsbtn.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.catmrow{display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid var(--line);}
.catmrow:last-child{border-bottom:none;}
.ceColor{padding:0;cursor:pointer;}
.acc-head{width:100%;display:flex;align-items:center;gap:10px;padding:4px 0;border:none;background:transparent;font:inherit;text-align:left;}
.acc-head .acc-chev{color:var(--muted);font-size:0.85rem;width:14px;}
.acc-head .acc-title{font-size:0.8125rem;color:var(--muted);font-weight:600;letter-spacing:.06em;}
.acc-head.open .acc-title{color:var(--ink);}
.sumcard{padding:14px}
.sumrow{display:flex;gap:8px}
.sumcell{flex:1;text-align:center}
.sumcell .t{font-size:0.75rem;color:var(--muted);margin-bottom:2px}
.sumcell .v{font-size:1.0625rem;font-weight:700;font-variant-numeric:tabular-nums}
.docitem{padding:8px 0;border-bottom:1px solid var(--line);}
.docitem:last-child{border-bottom:none;}
.docname{font-size:0.8125rem;line-height:1.45;word-break:break-all;margin-bottom:6px;}
.docbtns{display:flex;gap:8px;}
.doctype{margin-bottom:8px;}
.doctypebtn{width:100%;display:flex;align-items:center;gap:8px;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:var(--surface);font:inherit;text-align:left;}
.doctypebtn.open{border-color:var(--ink);background:var(--bg);}
.doctypebtn .chev{color:var(--muted);font-size:0.75rem;width:14px;}
.doctypebtn .tname{flex:1;font-size:0.875rem;font-weight:700;color:var(--ink);}
.doctypebtn .tcount{font-size:0.75rem;color:var(--muted);}
.doctypelist{padding:2px 12px 4px;}
/* 収支サマリ */
.balrow{display:flex;gap:10px;}
.balrow .cell{flex:1;text-align:center;border-radius:10px;padding:4px 0;cursor:pointer;border:1px solid transparent;}
.balrow .cell.selcell{background:var(--bg);border-color:var(--line);}
.balrow .t{font-size:0.75rem;color:var(--muted);}
.balrow .v{font-size:1.125rem;font-weight:700;}
.v.inc{color:var(--income);} .v.exp{color:var(--expense);}
.bigbal{text-align:center;margin:4px 0 10px;}
.bigbal .v{font-size:2.125rem;font-weight:800;letter-spacing:.01em;}
.bigbal .t{font-size:0.75rem;color:var(--muted);letter-spacing:.1em;}
canvas{display:block;width:100%;}
/* 凡例 */
.legend{display:grid;grid-template-columns:1fr 1fr;gap:4px 14px;margin-top:10px;font-size:0.8125rem;}
.legend .li{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.legend .nm{display:flex;align-items:center;gap:7px;min-width:0;}
.legend .nm span.txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dot{width:10px;height:10px;border-radius:3px;flex:0 0 10px;}
.legend .amt{color:var(--muted);}
/* 医療費プログレス */
.prog{height:10px;background:var(--bg);border-radius:6px;overflow:hidden;margin-top:8px;border:1px solid var(--line);}
.prog>i{display:block;height:100%;background:#4E7AA6;border-radius:6px;}
.progmeta{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--muted);margin-top:5px;}
/* 明細リスト */
.txrow{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line);}
.txrow:last-child{border-bottom:none;}
.txrow .cat{flex:0 0 10px;}
.txrow .mid{flex:1;min-width:0;}
.txrow .nm{font-size:0.9375rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.txrow .meta{font-size:0.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.txrow .amt{font-size:0.9375rem;font-weight:700;white-space:nowrap;}
.amt.exp{color:var(--expense);} .amt.inc{color:var(--income);} .amt.trf{color:var(--transfer);}
.daterule{font-size:0.75rem;color:var(--muted);background:var(--bg);padding:3px 10px;border-radius:8px;
  margin:10px 0 2px;display:inline-block;}
.filterbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.catchips{margin:8px 0 10px;}
.catchips-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.catchips-label{font-size:0.75rem;font-weight:700;color:var(--muted);}
.catclear{font-size:0.75rem;font-weight:600;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:3px 12px;}
.chiprow{display:flex;flex-wrap:wrap;gap:6px;}
.catchip{font-size:0.7812rem;font-weight:600;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:6px 12px;line-height:1;}
.catchip.on{box-shadow:0 1px 3px rgba(0,0,0,.12);}
.catfilter{display:flex;align-items:center;gap:8px;margin:8px 0 8px;}
.catopen{flex:1;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid var(--line);border-radius:10px;background:var(--surface);font:inherit;font-size:0.875rem;font-weight:600;color:var(--ink);}
.catopen-chev{color:var(--muted);font-size:0.75rem;}
.catsec-title{font-size:0.75rem;font-weight:700;color:var(--muted);margin:12px 0 6px;}
.bigcat-overlay{position:fixed;inset:0;background:var(--bg);z-index:40;display:flex;flex-direction:column;}
.bigcat-panel{display:flex;flex-direction:column;height:100%;width:100%;max-width:760px;margin:0 auto;}
.bigcat-head{padding:calc(14px + env(safe-area-inset-top)) 20px 10px;border-bottom:1px solid var(--line);background:var(--surface);}
.bigcat-title{font-size:1.25rem;font-weight:800;color:var(--ink);}
.bigcat-body{flex:1;overflow:auto;padding:6px 16px 14px;}
.bigcat-sec{font-size:0.9rem;font-weight:800;color:var(--muted);margin:14px 4px 8px;}
.bigcat-sec:first-child{margin-top:8px;}
.bigcat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.bigcat-chip{display:flex;align-items:center;gap:7px;padding:11px 9px;border:2px solid var(--line);border-radius:12px;background:var(--surface);font:inherit;font-size:0.85rem;font-weight:700;color:var(--ink);text-align:left;line-height:1.15;}
.bigcat-chip.on{box-shadow:0 2px 8px rgba(0,0,0,.18);}
.bigcat-dot{width:13px;height:13px;border-radius:50%;flex:none;}
.bigcat-chip.on .bigcat-dot{background:#fff !important;}
.bigcat-foot{display:flex;gap:10px;padding:12px 16px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:var(--surface);}
.bigcat-btn{flex:1;padding:15px;border:none;border-radius:13px;background:var(--ink);color:#fff;font:inherit;font-size:1.05rem;font-weight:800;}
.bigcat-btn.sub{background:var(--surface);color:var(--ink);border:2px solid var(--line);}
.catsec-title:first-child{margin-top:0;}
select,input[type=text],input[type=date],input[type=number]{
  font:inherit;padding:9px 10px;border:1px solid var(--line);border-radius:10px;background:var(--surface);
  color:var(--ink);min-width:0;}
.filterbar select{flex:1;}
/* ボタン */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font:inherit;font-weight:700;
  border:none;border-radius:12px;padding:13px 16px;background:var(--accent);color:#fff;width:100%;}
.btn.sub{background:var(--surface);color:var(--ink);border:1px solid var(--line);font-weight:600;}
.btn.danger{background:#fff;color:var(--expense);border:1px solid var(--expense);}
.btn:active{opacity:.8;}
.btn.small{width:auto;padding:8px 14px;font-size:0.875rem;}
.fab{position:fixed;right:18px;bottom:calc(76px + env(safe-area-inset-bottom));z-index:9;
  width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;font-size:1.75rem;
  border:none;box-shadow:0 4px 14px rgba(27,42,74,.3);}
/* タブバー */
nav.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(255,255,255,.96);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-top:1px solid var(--line);
  display:flex;padding-bottom:env(safe-area-inset-bottom);}
nav.tabbar button{flex:1;background:none;border:none;padding:9px 0 7px;font-size:0.6875rem;color:var(--muted);
  display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;}
nav.tabbar button.on{color:var(--ink);font-weight:700;}
nav.tabbar .ic{font-size:1.3125rem;line-height:1;}
/* モーダル */
.modalbg{position:fixed;inset:0;background:rgba(20,28,46,.45);z-index:30;display:flex;align-items:flex-end;}
.modal{background:var(--surface);width:100%;max-width:680px;margin:0 auto;border-radius:18px 18px 0 0;
  padding:18px 18px calc(18px + env(safe-area-inset-bottom));max-height:86vh;overflow:auto;}
.modal h3{margin:0 0 12px;font-size:1.0625rem;}
.frow{margin-bottom:12px;}
.frow label{display:block;font-size:0.75rem;color:var(--muted);margin-bottom:4px;}
.frow select,.frow input{width:100%;}
.chips{display:flex;gap:8px;flex-wrap:wrap;}
.chip{padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:var(--surface);
  font-size:0.8125rem;color:var(--ink);}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.checkrow{display:flex;align-items:center;gap:8px;font-size:0.875rem;margin:10px 0;}
.checkrow input{width:20px;height:20px;}
/* 取込 */
.dropmsg{font-size:0.8125rem;color:var(--muted);}
.implog{font-size:0.8125rem;background:var(--bg);border-radius:10px;padding:10px 12px;margin-top:10px;
  white-space:pre-wrap;}
.srcbadge{font-size:0.625rem;border:1px solid var(--line);border-radius:5px;padding:1px 5px;color:var(--muted);
  margin-right:5px;vertical-align:1px;}
/* ルール表 */
.rulerow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);font-size:0.875rem;}
.rulerow .kw{flex:1;font-weight:600;word-break:break-all;}
.rulerow .to{color:var(--muted);font-size:0.75rem;}
.rulerow button{border:none;background:none;color:var(--expense);font-size:0.8125rem;font-family:inherit;}
.empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:0.875rem;}
.note{font-size:0.75rem;color:var(--muted);margin-top:8px;}
h2.sec{font-size:0.875rem;margin:18px 4px 8px;color:var(--ink);}
.ttbl{font-size:0.8125rem;}
.ttbl .r{display:flex;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px solid var(--line);}
.ttbl .r:last-child{border-bottom:none;}
.ttbl .r span:last-child{font-variant-numeric:tabular-nums;white-space:nowrap;}
.ttbl .r.sum{font-weight:700;border-top:2px solid var(--ink);border-bottom:none;padding-top:7px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
</style>
</head>
<body>
<header class="app"><h1>わが家の家計簿</h1><div class="sub" id="hdrSub"></div></header>
<main id="view"></main>
<button class="fab" id="fab" style="display:none" aria-label="手入力で追加">＋</button>
<nav class="tabbar" id="tabbar">
  <button data-tab="home"><span class="ic">◉</span>ホーム</button>
  <button data-tab="assets"><span class="ic">¥</span>資産</button>
  <button data-tab="list"><span class="ic">≣</span>明細</button>
  <button data-tab="import"><span class="ic">⇪</span>取込</button>
  <button data-tab="tax"><span class="ic">％</span>申告</button>
  <button data-tab="settings"><span class="ic">⚙</span>設定</button>
</nav>
<div id="modalRoot"></div>

<script>
"use strict";
/* ============================================================
   わが家の家計簿 PWA — Phase 1
   取込(PayPay/三井住友銀行CSV) + 自動分類 + 明細 + ダッシュボード
   データは全て端末内(IndexedDB)。外部送信なし。
   ============================================================ */

/* ---------- カテゴリ定義 ---------- */
const DEFAULT_CATS = [
  // 支出
  {name:"食費",        type:"expense", color:"#D08C3C"},
  {name:"外食",        type:"expense", color:"#BF4E3C"},
  {name:"日用品",      type:"expense", color:"#A98F5F"},
  {name:"医療・薬",    type:"expense", color:"#4E7AA6", taxTag:"医療費"},
  {name:"水道光熱",    type:"expense", color:"#3E8E9E"},
  {name:"通信・サブスク",type:"expense", color:"#6B5B95"},
  {name:"住居費",      type:"expense", color:"#7A6A4F"},
  {name:"保険",        type:"expense", color:"#5E8C61", taxTag:"保険料"},
  {name:"衣料",        type:"expense", color:"#C97FA4"},
  {name:"旅行",        type:"expense", color:"#8E6FB8"},
  {name:"車両費",      type:"expense", color:"#556070"},
  {name:"娯楽",        type:"expense", color:"#B89B2E"},
  {name:"寄附・ふるさと納税", type:"expense", color:"#3C7A55", taxTag:"寄附金"},
  {name:"カード引落",  type:"expense", color:"#8A8F98"},
  {name:"税金・手数料",type:"expense", color:"#7B8794", taxTag:""},
  {name:"その他支出",  type:"expense", color:"#9AA0A6"},
  // 収入
  {name:"給与収入",    type:"income",  color:"#2E7D5B"},
  {name:"年金収入",    type:"income",  color:"#3C8C73"},
  {name:"その他収入",  type:"income",  color:"#6FA287"},
  // 振替
  {name:"振替(対象外)", type:"transfer", color:"#B8BCC2"},
];
// CATS / CAT は既定 + ユーザー編集(meta "catCustom")を合成して構築
let CATS = DEFAULT_CATS.map(c=>({...c}));
let CAT = Object.fromEntries(CATS.map(c=>[c.name,c]));
function buildCats(custom){
  // custom: { colors:{name:hex}, names:{defaultName:newName}, adds:[{name,type,color}] }
  custom = custom||{};
  const colors=custom.colors||{}, names=custom.names||{}, adds=custom.adds||[];
  const base=DEFAULT_CATS.map(c=>{
    const o={...c};
    if(names[c.name]) o.name=names[c.name];   // 名前変更(税タグ等は維持)
    if(colors[o.name]||colors[c.name]) o.color=colors[o.name]||colors[c.name];
    return o;
  });
  // 追加カテゴリ(色変更も colors で反映)
  for(const a of adds){
    const o={...a};
    if(colors[o.name]) o.color=colors[o.name];
    base.push(o);
  }
  CATS=base;
  CAT=Object.fromEntries(CATS.map(c=>[c.name,c]));
}
async function loadCatCustom(){
  try{ const r=await tget("meta","catCustom"); buildCats(r&&r.v); }
  catch(e){ buildCats(null); }
}
async function saveCatCustom(custom){
  await tput("meta",{k:"catCustom",v:custom});
  buildCats(custom);
}
async function getCatCustom(){
  const r=await tget("meta","catCustom"); return (r&&r.v)||{colors:{},names:{},adds:[]};
}

/* ---------- 初期ルール(キーワード → カテゴリ) ---------- */
const SEED_RULES = [
  {kw:"給料",            cat:"給与収入"},
  {kw:"ネンキン",        cat:"年金収入"},
  {kw:"ｺｳｾｲﾈﾝｷﾝ",        cat:"年金収入"},
  {kw:"年金",            cat:"年金収入"},
  {kw:"当選金",          cat:"その他収入"},
  {kw:"PAYPAYｶ-ﾄﾞ",      cat:"振替(対象外)"},   // PayPay明細側で計上するため
  {kw:"PayPayカード",    cat:"振替(対象外)"},
  {kw:"ﾔﾏﾄ ﾀﾀﾞｼ",        cat:"振替(対象外)"},   // 本人間振込
  {kw:"ｾｿﾞﾝ",            cat:"振替(対象外)"},   // セゾン明細側で計上するため
  {kw:"セゾン",          cat:"振替(対象外)"},
  {kw:"ﾐﾂｲｽﾐﾄﾓｶ-ﾄﾞ",     cat:"振替(対象外)"},   // Olive明細側で計上するため
  {kw:"ｲｵﾝﾌｲﾅﾝｼﾔﾙ",      cat:"振替(対象外)"},   // イオンカード明細側で計上するため
  {kw:"キャッシュバック",cat:"振替(対象外)"},   // ポイント交換・現金以外の動き
  {kw:"ポイント交換",    cat:"振替(対象外)"},
  {kw:"ポイント利用",    cat:"振替(対象外)"},
  {kw:"ポイント充当",    cat:"振替(対象外)"},
  {kw:"ポイントご利用",  cat:"振替(対象外)"},
  {kw:"ﾎﾟｲﾝﾄ利用",       cat:"振替(対象外)"},
  {kw:"ﾎﾟｲﾝﾄ交換",       cat:"振替(対象外)"},
  {kw:"イオンフィナンシャル",cat:"振替(対象外)"},
  {kw:"ｶﾝｻｲﾃﾞﾝﾘﾖｸ",      cat:"水道光熱"},
  {kw:"電力",            cat:"水道光熱"},
  {kw:"ｵｵｻｶｶﾞｽ",         cat:"水道光熱"},
  {kw:"大阪ガス",        cat:"水道光熱"},
  {kw:"水道",            cat:"水道光熱"},
  {kw:"ｷﾖｳｻｲ",           cat:"保険"},
  {kw:"共済",            cat:"保険"},
  {kw:"保険",            cat:"保険"},

/* ---------- IndexedDB ---------- */
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const rq = indexedDB.open("kakeibo", 4);
    rq.onupgradeneeded = e=>{
      const d = e.target.result;
      if(!d.objectStoreNames.contains("tx")){
        const s = d.createObjectStore("tx",{keyPath:"id"});
        s.createIndex("date","date");
      }
      if(!d.objectStoreNames.contains("rules"))
        d.createObjectStore("rules",{keyPath:"rid",autoIncrement:true});
      if(!d.objectStoreNames.contains("meta"))
        d.createObjectStore("meta",{keyPath:"k"});
      if(!d.objectStoreNames.contains("accounts"))
        d.createObjectStore("accounts",{keyPath:"aid",autoIncrement:true});
      if(!d.objectStoreNames.contains("bal"))
        d.createObjectStore("bal",{keyPath:"bid"});
      if(!d.objectStoreNames.contains("tax"))
        d.createObjectStore("tax",{keyPath:"year"});
      if(!d.objectStoreNames.contains("docs")){
        const s = d.createObjectStore("docs",{keyPath:"did",autoIncrement:true});
        s.createIndex("year","year");
      }
    };
    rq.onsuccess = e=>{db=e.target.result;res();};
    rq.onerror = e=>rej(e);
  });
}
function tput(store,obj){return new Promise((res,rej)=>{
  const t=db.transaction(store,"readwrite");
  const rq=t.objectStore(store).put(obj);
  let key; rq.onsuccess=()=>{key=rq.result;};
  t.oncomplete=()=>res(key);t.onerror=rej;});}
function tdel(store,key){return new Promise((res,rej)=>{
  const t=db.transaction(store,"readwrite");t.objectStore(store).delete(key);
  t.oncomplete=res;t.onerror=rej;});}
function tall(store){return new Promise((res,rej)=>{
  const rq=db.transaction(store).objectStore(store).getAll();
  rq.onsuccess=()=>res(rq.result);rq.onerror=rej;});}
function tget(store,key){return new Promise((res,rej)=>{
  const rq=db.transaction(store).objectStore(store).get(key);
  rq.onsuccess=()=>res(rq.result);rq.onerror=rej;});}
function tclear(store){return new Promise((res,rej)=>{
  const t=db.transaction(store,"readwrite");t.objectStore(store).clear();
  t.oncomplete=res;t.onerror=rej;});}

  const existingKw=new Set();

      r.cat="振替(対象外)"; await tput("rules",r);
    }
    if(r.kw==="ガス"){ // 「ガスト」誤マッチ防止: 銀行摘要形式の半角カナへ
      r.kw="ｶﾞｽ"; await tput("rules",r); existingKw.add("ｶﾞｽ");
    }
  }
  // 2) Olive向け店舗ルールを追加(既存キーワードは重複追加しない)
  for(const [kw,cat] of [["ダイソー","日用品"],["イトーヨーカドー","食費"],["イオンリテール","食費"],
    ["イオンモール","食費"],["イオン　","食費"],["おおとりウィングス","娯楽"],["とんかつ","外食"],

    ["自販機","食費"],["トーヨーベンディング","食費"],["道の駅","旅行"]]){
    if(!existingKw.has(kw)) await tput("rules",{kw,cat});
  }
  await loadRules();
  // 3) 手動確定していない明細にルールを再適用(過去のカード引落が振替に変わる)
  for(const t of await tall("tx")){
    if(t.locked) continue;
    const before=t.category+"|"+t.type;
    categorize(t);
    if(t.category+"|"+t.type!==before) await tput("tx",t);
  }

/* ---------- ユーティリティ ---------- */
const yen = n => "¥" + Math.round(n).toLocaleString("ja-JP");
function fnv(str){ // 簡易ハッシュ(重複判定用)
  let h=0x811c9dc5;
  for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,0x01000193)>>>0;}
  return h.toString(36)+"_"+str.length;
}
function parseAmt(s){
  if(s==null) return null;
  s=String(s).replace(/[",¥\\\s円]/g,"");
  if(s===""||s==="-") return null;
  const n=Number(s); return isNaN(n)?null:n;
}
function normDate(s){ // "2026/4/6" "2026/04/30 04:15:42" → YYYY-MM-DD (+time)
  const m=String(s).trim().match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})(?:[ T](\d{2}:\d{2}(?::\d{2})?))?/);
  if(!m) return null;
  return {date:`${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`, time:m[4]||""};
}
function monthOf(d){return d.slice(0,7);}
function esc(s){return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---------- CSVパーサ(引用符・カンマ対応) ---------- */
function parseCSV(text){
  const rows=[];let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; }
      else cur+=c;
    }else{
      if(c==='"') q=true;
      else if(c===","){row.push(cur);cur="";}
      else if(c==="\n"||c==="\r"){
        if(c==="\r"&&text[i+1]==="\n") i++;
        row.push(cur);cur="";
        if(row.some(x=>x!=="")) rows.push(row);
        row=[];
      }else cur+=c;
    }
  }
  if(cur!==""||row.length){row.push(cur); if(row.some(x=>x!=="")) rows.push(row);}
  return rows;
}
function decodeBuf(buf){
  try{ return new TextDecoder("utf-8",{fatal:true}).decode(buf); }
  catch(e){ return new TextDecoder("shift_jis").decode(buf); }
}

/* ---------- 取込:フォーマット判定と正規化 ---------- */
function detectFormat(header){
  const h = header.join(",");
  if(h.includes("取引番号") && h.includes("取引先")) return "paypay";
  if(h.includes("お引出し") && h.includes("お取り扱い内容")) return "smbc";
  if(h.includes("お取引内容") && h.includes("お引出し")) return "aeon"; // イオン銀行
  if(h.includes("口座名") && h.includes("年月日")) return "bank"; // 汎用銀行形式
  // セゾン: 1行目が「カード名称,...」、または明細ヘッダーに「ご利用店名」
  if((header[0]||"").trim()==="カード名称") return "saison";
  if(h.includes("ご利用店名") && h.includes("利用金額")) return "saison";
  // PayPayカード(クレジット)請求明細: 利用日/キャンセル日 + 支払総額 + 当月お支払日
  if(h.includes("利用日/キャンセル日") && h.includes("当月お支払日")) return "ppcard";
  // イオンカード利用明細: 1行目「ご利用カード」+「今回ご請求金額」ヘッダー
  if((header[0]||"").trim()==="ご利用カード") return "aeoncard";
  // Olive/Vpass: 1行目が「氏名 様, 4980-09**-..., Ｏｌｉｖｅ／クレジット」形式、または日付始まりの明細行
  if(header.length>=3 && ((header[0]||"").trim().endsWith("様") || /\*\*/.test(header[1]||""))) return "olive";
  if(normDate(header[0]) && header.length>=6 && parseAmt(header[2])!=null) return "olive";
  return null;
}

function normalizeOlive(rows){
  const out=[]; let method="Olive/クレジット"; const seen={};
  for(const c of rows){
    if(!c.length) continue;
    const c0=(c[0]||"").trim();
    const d=normDate(c0);
    if(!d){ // カードヘッダー行(氏名/番号/カード種別)・合計行はスキップ
      if(c.length>=3 && (c0.endsWith("様")||/\*\*/.test(c[1]||"")) && (c[2]||"").trim())
        method=(c[2]||"").trim();
      continue;
    }
    const amount=parseAmt(c[2]) ?? parseAmt(c[5]); // 利用金額(なければお支払金額)
    if(!amount) continue;
    let who=(c[1]||"").trim();
    const mm=who.match(/^(.*?)[／/](ｉＤ|ＮＦＣ|iD|NFC)$/); // 末尾の決済手段表記を除去
    if(mm) who=mm[1].trim();
    const key=[d.date,who,amount].join("|");
    seen[key]=(seen[key]||0)+1; // 同日同額の正当な複数取引に連番付与
    out.push({
      id:"olive:"+fnv(key)+"-"+seen[key],
      date:d.date, time:"", amount, type:"expense",
      counterparty:who, memo:(c[6]||"").trim(),
      method, source:"olive", category:"", taxTag:"", locked:false
    });
  }
  // 未払金: このファイルの利用合計を、最新利用月の月末時点の負債として記録
  let bill=null;
  if(out.length){
    const total=out.reduce((s,t)=>s+t.amount,0);
    const lastMonth=out.reduce((m,t)=>t.date>m?t.date:m,out[0].date).slice(0,7);
    bill={ card:"Olive", month:lastMonth, amount:total };
  }
  return {txs:out, excluded:0, bill};
}

function normalizeBank(rows){ // 汎用銀行形式: 口座名,年月日,お引出し,お預入れ,摘要,残高
  const out=[]; const bals={}; let accName="";
  const H=rows[0]; const idx=n=>H.indexOf(n);

        iIn=idx("お預入れ"), iDesc=idx("摘要"), iBal=idx("残高");
  for(let r=1;r<rows.length;r++){
    const c=rows[r];
    const d=normDate(c[iDate]); if(!d) continue;
    if(!accName) accName=(c[iAcc]||"").trim();
    const balV=parseAmt(c[iBal]);

      const m=d.date.slice(0,7);

    }

    });

  return {txs:out, excluded:0, bals, accName};
}

function normalizeSaison(rows){ // セゾン: ヘッダー部+空行+明細(利用日,店名,本人区分,支払区分,締前,利用金額,備考)
  const out=[]; const seen={};
  // ヘッダー部から支払日・請求額を取得
  let payDate=null, billAmt=null;
  for(let i=0;i<rows.length;i++){
    const k=(rows[i][0]||"").trim();
    if(k==="お支払日"){ const d=normDate(rows[i][1]); if(d) payDate=d.date; }
    if(k==="今回ご請求額"){ billAmt=parseAmt(rows[i][1]); } // ゼロ埋めもparseAmtで除去
    if(k==="利用日") break;
  }
  // 明細ヘッダー行(「利用日」を含む)を探す
  let hi=-1;
  for(let i=0;i<rows.length;i++){
    if((rows[i][0]||"").trim()==="利用日"){ hi=i; break; }
  }
  if(hi<0) return {txs:out, excluded:0};
  const H=rows[hi].map(h=>h.trim());
  const iDate=H.indexOf("利用日"),
        iWho=H.findIndex(h=>h.includes("ご利用店名")),
        iAmt=H.indexOf("利用金額");
  for(let r=hi+1;r<rows.length;r++){
    const c=rows[r];
    const d=normDate(c[iDate]); if(!d) continue;
    const amount=parseAmt(c[iAmt]); if(!amount) continue;
    const who=(c[iWho]||"").trim();
    const key=[d.date,who,amount].join("|");
    seen[key]=(seen[key]||0)+1; // 同日同額の複数取引に連番
    out.push({
      id:"saison:"+fnv(key)+"-"+seen[key],
      date:d.date, time:"", amount, type:"expense",
      counterparty:who, memo:"", method:"セゾン/クレジット",
      source:"saison", category:"", taxTag:"", locked:false
    });
  }
  // 未払金: 支払日の前月末時点の負債として記録(例:12/4支払→11月末の未払金)
  let bill=null;
  if(billAmt!=null && payDate) bill={ card:"セゾン", month:shiftMonth(payDate.slice(0,7),-1), amount:billAmt };
  return {txs:out, excluded:0, bill};
}

function normalizePayPay(rows){
  const out=[]; let excluded=0;
  const H=rows[0]; const idx=n=>H.indexOf(n);
  const iDate=idx("取引日"), iOut=H.findIndex(h=>h.startsWith("出金金額")),
        iIn=H.findIndex(h=>h.startsWith("入金金額")), iKind=idx("取引内容"),
        iWho=idx("取引先"), iHow=idx("取引方法"), iNo=idx("取引番号");
  for(let r=1;r<rows.length;r++){
    const c=rows[r]; const kind=c[iKind]||"";
    if(kind.includes("ポイント")){excluded++;continue;}   // ポイント獲得・期限切れは除外
    const d=normDate(c[iDate]); if(!d) continue;
    const outAmt=parseAmt(c[iOut]), inAmt=parseAmt(c[iIn]);
    let type, amount;
    if(outAmt){type = kind.includes("チャージ")?"transfer":"expense"; amount=outAmt;}
    else if(inAmt){type = kind.includes("チャージ")?"transfer":"income"; amount=inAmt;}
    else continue;
    const who=(c[iWho]||"").trim();
    out.push({
      id:"pp:"+ (c[iNo]||fnv(c.join("|"))) + ":" + kind + ":" + amount,
      date:d.date, time:d.time, amount, type,
      counterparty: who.split(" - ")[0] || who || kind,
      memo: who.includes(" - ") ? who : "",
      method:(c[iHow]||"").trim(),
      source:"paypay", category:"", taxTag:"", locked:false
    });
  }
  return {txs:out, excluded};
}

function normalizeAeonCard(rows){ // イオンカード利用明細
  const out=[]; const seen={}; let billAmt=null, payDate=null;
  // ヘッダー部から請求額・支払日を取得
  for(let i=0;i<rows.length;i++){
    const k=(rows[i][0]||"").trim();
    if(k==="今回ご請求金額") billAmt=parseAmt(rows[i][1]);
    if(k==="お支払い日"){ // 「2026年 5月 7日」形式
      const m=String(rows[i][1]||"").match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
      if(m) payDate=`${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`;
    }
    if(k==="ご利用日") break; // 明細ヘッダーに到達
  }
  // 「ご利用明細」セクションのヘッダー行を探す
  let hi=-1;
  for(let i=0;i<rows.length;i++){
    if((rows[i][0]||"").trim()==="ご利用日" && (rows[i][2]||"").includes("ご利用先")){ hi=i; break; }
  }
  if(hi<0) return {txs:out, excluded:0};
  for(let r=hi+1;r<rows.length;r++){
    const c=rows[r];
    const c0=(c[0]||"").trim();
    // 「分割・ボーナス払い明細」セクション以降は別構造なので終了
    if(c0.includes("分割")||c0.includes("ボーナス")) break;
    // YYMMDD(6桁)の日付
    const m=c0.match(/^(\d{2})(\d{2})(\d{2})$/);
    if(!m) continue;
    const date=`20${m[1]}-${m[2]}-${m[3]}`;
    const who=(c[2]||"").trim();
    const amount=parseAmt(c[6]); if(amount==null) continue;
    const key=[date,who,amount].join("|");
    seen[key]=(seen[key]||0)+1;
    out.push({
      id:"aeoncard:"+fnv(key)+"-"+seen[key],
      date, time:"", amount, type:"expense",
      counterparty:who, memo:(c[7]||"").trim(), method:"イオンカード",
      source:"aeoncard", category:"", taxTag:"", locked:false
    });
  }
  let bill=null;
  if(billAmt!=null && billAmt>0 && payDate) bill={ card:"イオンカード", month:shiftMonth(payDate.slice(0,7),-1), amount:billAmt };
  return {txs:out, excluded:0, bill};
}

function normalizePPCard(rows){ // PayPayカード請求明細
  const out=[]; const seen={}; let billTotal=0; let payDate=null;
  const H=rows[0].map(h=>h.trim());
  const iDate=H.indexOf("利用日/キャンセル日"),
        iWho=H.findIndex(h=>h.includes("利用店名")),
        iSiharai=H.indexOf("支払総額"),
        iTougetsu=H.indexOf("当月支払金額"),
        iPayDay=H.indexOf("当月お支払日");
  for(let r=1;r<rows.length;r++){
    const c=rows[r];
    const d=normDate(c[iDate]); if(!d) continue;
    const amount=parseAmt(c[iSiharai]); if(amount==null) continue;
    if(!payDate && c[iPayDay]){ const pd=normDate(c[iPayDay]); if(pd) payDate=pd.date; }
    const who=(c[iWho]||"").trim();
    // キャンセル(マイナス)も金額として扱う
    const tougetsu=parseAmt(c[iTougetsu]); if(tougetsu!=null) billTotal+=tougetsu;
    const key=[d.date,who,amount].join("|");
    seen[key]=(seen[key]||0)+1;
    out.push({
      id:"ppcard:"+fnv(key)+"-"+seen[key],
      date:d.date, time:"", amount, type:"expense",
      counterparty:who, memo:"", method:"PayPayカード",
      source:"ppcard", category:"", taxTag:"", locked:false
    });
  }
  // 未払金: 支払日の前月末時点の負債(例:6/29支払→5月末の未払金)
  let bill=null;
  if(billTotal>0 && payDate) bill={ card:"PayPay", month:shiftMonth(payDate.slice(0,7),-1), amount:billTotal };
  return {txs:out, excluded:0, bill};
}

function normalizeSMBC(rows){
  const out=[]; const bals={};
  const H=rows[0]; const idx=n=>H.indexOf(n);
  const iDate=idx("年月日"), iOut=idx("お引出し"), iIn=idx("お預入れ"),
        iDesc=idx("お取り扱い内容"), iBal=idx("残高");
  for(let r=1;r<rows.length;r++){
    const c=rows[r];
    const d=normDate(c[iDate]); if(!d) continue;
    const balV=parseAmt(c[iBal]);

      const m=d.date.slice(0,7);
      if(!bals[m] || d.date>=bals[m].date) bals[m]={date:d.date, amount:balV};
    }
    const outAmt=parseAmt(c[iOut]), inAmt=parseAmt(c[iIn]);
    const desc=(c[iDesc]||"").trim();
    let type, amount;
    if(outAmt){type="expense";amount=outAmt;}
    else if(inAmt){type="income";amount=inAmt;}
    else continue;
    out.push({
      id:"smbc:"+fnv([d.date,amount,desc,c[iBal]||"",type].join("|")),
      date:d.date, time:"", amount, type,
      counterparty:desc, memo:"", method:"口座振替/振込",

}

/* ---------- 自動分類 ---------- */
const norm=s=>String(s||"").normalize("NFKC").toLowerCase(); // 全角半角・大小文字を同一視
let rulesCache=[];
async function loadRules(){ rulesCache = await tall("rules"); }
function categorize(tx){
  const dir = tx.type; // CSV由来の入出金方向(expense/income/transfer)
  const hay = norm(tx.counterparty+" "+tx.memo);
  for(const r of rulesCache){
    if(hay.includes(norm(r.kw))){
      const cd=CAT[r.cat];
      // ルールのカテゴリが入出金方向と矛盾する場合はスキップ
      // (例:「年金」が出金明細に当たっても年金収入にはしない)
      if(cd && dir==="expense" && cd.type==="income") continue;
      if(cd && dir==="income" && cd.type==="expense") continue;
      tx.category=r.cat;
      if(cd){ tx.type=cd.type; tx.taxTag = tx.taxTag || cd.taxTag || ""; }
      return tx;
    }
  }
  tx.category = tx.type==="income" ? "その他収入" :
                tx.type==="transfer" ? "振替(対象外)" : "その他支出";
  return tx;
}

/* ---------- 取込実行 ---------- */
async function importFiles(files){
  await loadRules();
  const existing = new Set((await tall("tx")).map(t=>t.id));
  const logs=[]; const hist=[];
  for(const f of files){
    try{
      const buf=await f.arrayBuffer();
      const text=decodeBuf(buf);
      const rows=parseCSV(text);
      if(!rows.length){logs.push(`✗ ${f.name}: 空のファイル`);
        hist.push({ts:Date.now(),file:f.name,err:"空のファイル"});continue;}
      const fmt=detectFormat(rows[0]);
      if(!fmt){logs.push(`✗ ${f.name}: 未対応の形式です(PayPay / 三井住友銀行 / Olive / イオン銀行のCSVに対応)`);
        hist.push({ts:Date.now(),file:f.name,err:"未対応の形式"});continue;}
      const res = fmt==="paypay"?normalizePayPay(rows)
                : fmt==="smbc"  ?normalizeSMBC(rows)
                : fmt==="aeon"  ?normalizeAeonCSV(rows)
                : fmt==="saison"?normalizeSaison(rows)
                : fmt==="ppcard"?normalizePPCard(rows)
                : fmt==="aeoncard"?normalizeAeonCard(rows)
                : fmt==="bank"  ?normalizeBank(rows)
                : normalizeOlive(rows);
      const {txs,excluded} = res;
      let added=0,dup=0;
      for(const tx of txs){
        if(existing.has(tx.id)){dup++;continue;}
        categorize(tx);
        await tput("tx",tx);
        existing.add(tx.id);added++;
      }
      const fname = fmt==="paypay"?"PayPay(取引履歴)":fmt==="smbc"?"三井住友銀行"
                  :fmt==="aeon"?"イオン銀行":fmt==="saison"?"セゾンカード"
                  :fmt==="ppcard"?"PayPayカード(請求明細)":fmt==="aeoncard"?"イオンカード(請求明細)"
                  :fmt==="bank"?(res.accName||"銀行"):"Olive/三井住友カード";
      logs.push(`✓ ${f.name}(${fname})\n　取込 ${added}件 / 重複スキップ ${dup}件`+
        (excluded?` / ポイント行除外 ${excluded}件`:""));
      let balN=0, balAcc="";
      if((fmt==="smbc"||fmt==="bank"||fmt==="aeon") && res.bals && Object.keys(res.bals).length){
        const accName = fmt==="smbc" ? "三井住友銀行" : (res.accName||"銀行口座");
        const acc=await ensureAccount(accName,"asset");
        let nb=0;
        for(const [m,b] of Object.entries(res.bals)){
          const bid=m+":"+acc.aid;
          // 銀行口座は常にCSVの残高を優先(手入力の食い違いを残さない)
          await tput("bal",{bid,month:m,aid:acc.aid,amount:b.amount,auto:true,asof:b.date});
          nb++;
        }
        if(nb) logs.push(`　└ ${accName}の月末残高 ${nb}ヶ月分を「資産」に自動記録`);
        balN=nb; balAcc=accName;
      }
      // カード未払金を負債口座に自動記録(セゾン・Oliveは請求合計が取れる)
      if(res.bill && res.bill.amount>0){
        const liab=await ensureAccount("カード未払金","liability");
        const bid=res.bill.month+":"+liab.aid;
        // 同月に複数カードがある場合は合算(カード別の内訳をmetaに保持)
        const slotKey="cardbill:"+res.bill.month;
        const slot=(await tget("meta",slotKey))?.v || {};
        slot[res.bill.card]=res.bill.amount;
        await tput("meta",{k:slotKey,v:slot});
        const sum=Object.values(slot).reduce((s,v)=>s+v,0);
        await tput("bal",{bid,month:res.bill.month,aid:liab.aid,amount:sum,auto:true});
        logs.push(`　└ ${res.bill.card}の請求額 ${yen(res.bill.amount)} を「カード未払金(負債)」に記録`);
      }
      hist.push({ts:Date.now(),file:f.name,fmt:fname,added,dup,excluded,balN});
    }catch(e){
      logs.push(`✗ ${f.name}: 読込エラー(${e.message||e})`);
      hist.push({ts:Date.now(),file:f.name,err:"読込エラー"});
    }
  }
  if(hist.length){
    const ex=(await tget("meta","importLog"));
    const old=(ex&&ex.v)||[];
    await tput("meta",{k:"importLog",v:hist.reverse().concat(old).slice(0,100)});
  }
  return logs.join("\n");
}

/* ---------- 集計 ---------- */
async function allTx(){ return (await tall("tx")).sort((a,b)=> (b.date+b.time).localeCompare(a.date+a.time)); }
function sumMonth(txs,month){
  let inc=0,exp=0;const byCat={};
  for(const t of txs){
    if(monthOf(t.date)!==month) continue;
    if(t.type==="income") inc+=t.amount;
    else if(t.type==="expense"){exp+=t.amount;byCat[t.category]=(byCat[t.category]||0)+t.amount;}
  }
  return {inc,exp,byCat};
}
function sumRange(txs,fromMonth,toMonth){ // fromMonth〜toMonth(両端含む、"YYYY-MM")
  let inc=0,exp=0;const byCat={};const incByCat={};
  for(const t of txs){
    const mm=monthOf(t.date);
    if(mm<fromMonth||mm>toMonth) continue;
    if(t.type==="income"){inc+=t.amount;incByCat[t.category]=(incByCat[t.category]||0)+t.amount;}
    else if(t.type==="expense"){exp+=t.amount;byCat[t.category]=(byCat[t.category]||0)+t.amount;}
  }
  return {inc,exp,byCat,incByCat};
}
function medicalYTD(txs,year){
  let s=0;
  for(const t of txs) if(t.taxTag==="医療費" && t.type==="expense" && t.date.startsWith(year)) s+=t.amount;
  return s;
}

// 区分の判定(薬局・ドラッグストアは医薬品購入、それ以外は診療・治療)
function iryouhiKubun(name){
  const h=norm(name);
  if(/薬局|ﾄﾞﾗｯｸ|ドラッグ|ファイン|ｺｺｶﾗ|ココカラ|ﾏﾂﾓﾄ|マツモト|ｳｴﾙｼｱ|ウエルシア|ｽｷﾞ薬|スギ薬|薬品|ﾔｯｷﾖｸ/.test(h)) return "医薬品購入";

async function exportIryouhi(year,txs){
  const note=el("iryouhiNote"), btn=el("iryouhiExport");
  const meds=txs.filter(t=>t.taxTag==="医療費"&&t.type==="expense"&&t.date.startsWith(String(year)))
    .sort((a,b)=>a.date.localeCompare(b.date));
  if(!meds.length){ if(note)note.textContent="この年に税タグ「医療費」の取引がありません。明細から医療費に税タグを付けてください。"; return; }
  try{
    if(btn){btn.disabled=true;btn.textContent="出力の準備中…";}
    // テンプレート(Base64)とJSZipを遅延読み込み
    await loadScriptOnce("jszip.min.js","JSZip");
    await loadScriptOnce("template_iryouhi.b64.js","IRYOUHI_TEMPLATE_B64");
    const JSZip=window.JSZip;
    const b64=window.IRYOUHI_TEMPLATE_B64;
    const bin=atob(b64); const buf=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) buf[i]=bin.charCodeAt(i);
    // xlsx(zip)を展開し、ワークシートXMLに値だけを差し込む(書式・列幅・罫線はテンプレートのまま保持)
    const zip=await JSZip.loadAsync(buf);
    let xml=await zip.file("xl/worksheets/sheet1.xml").async("string");
    const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const KCOL={"診療・治療":"D","医薬品購入":"E","介護保険サービス":"F","その他の医療費":"G"};
    // 既存セル <c r="addr" .../> に値を差し込む(テンプレートのスタイル属性 s="N" は維持)
    const setStr=(addr,text)=>{
      const re=new RegExp('<c r="'+addr+'"([^>]*?)/>');
      xml=xml.replace(re,(m,attrs)=>{
        attrs=attrs.replace(/\s+t="[^"]*"/,""); // 既存t属性を除去
        return `<c r="${addr}"${attrs} t="inlineStr"><is><t xml:space="preserve">${esc(text)}</t></is></c>`;
      });
    };
    const setNum=(addr,num)=>{
      const re=new RegExp('<c r="'+addr+'"([^>]*?)/>');
      xml=xml.replace(re,(m,attrs)=>{
        attrs=attrs.replace(/\s+t="[^"]*"/,"");
        return `<c r="${addr}"${attrs}><v>${num}</v></c>`;
      });
    };
    let row=9;
    for(const t of meds){
      setStr("B"+row,"本人");
      setStr("C"+row,(t.counterparty||"").slice(0,20));
      setStr(KCOL[iryouhiKubun(t.counterparty)]+row,"該当する");
      setNum("H"+row,t.amount);
      setStr("J"+row,t.date.replace(/-/g,"/"));
      row++;
    }
    zip.file("xl/worksheets/sheet1.xml",xml);
    // calcChain.xmlは数式依存関係のキャッシュ。値差し込みで不整合が出ないよう削除(Excelが再生成)
    if(zip.file("xl/calcChain.xml")) zip.remove("xl/calcChain.xml");
    const out=await zip.generateAsync({type:"blob",mimeType:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const url=URL.createObjectURL(out);
    const a=document.createElement("a");
    a.href=url; a.download=`医療費集計フォーム_${year}.xlsx`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),60000);
    if(note)note.textContent=`${meds.length}件を書き出しました(合計 ${yen(meds.reduce((s,t)=>s+t.amount,0))})。ダウンロードを確認してください。`;
  }catch(err){
    if(note)note.textContent="出力に失敗しました: "+(err.message||err);
  }finally{
    if(btn){btn.disabled=false;btn.textContent=`${year}年分の医療費集計フォーム(Excel)を出力`;}
  }
}

/* ---------- 描画:ドーナツ&棒グラフ(依存ライブラリなし) ---------- */
function drawDonut(canvas, items, centerLabel, centerValue){
  const dpr=window.devicePixelRatio||1;
  const w=canvas.clientWidth, h=220;
  canvas.width=w*dpr; canvas.height=h*dpr; canvas.style.height=h+"px";
  const ctx=canvas.getContext("2d"); ctx.scale(dpr,dpr);
  const cx=w/2, cy=h/2, R=Math.min(w,h)/2-10, r=R*0.66;
  // 円グラフはプラスの項目のみで構成(返金などのマイナスや0は除外)
  const pos=items.filter(i=>i.v>0);
  const total=pos.reduce((s,i)=>s+i.v,0);
  let a=-Math.PI/2;
  if(total<=0){
    ctx.strokeStyle="#E3E6E0";ctx.lineWidth=R-r;
    ctx.beginPath();ctx.arc(cx,cy,(R+r)/2,0,Math.PI*2);ctx.stroke();
  }else{
    for(const it of pos){
      const ang=it.v/total*Math.PI*2;
      const gap=Math.min(0.012, ang*0.25); // 極小セグメントでも開始角<終了角を保証
      ctx.beginPath();
      ctx.strokeStyle=it.color;ctx.lineWidth=R-r;
      ctx.arc(cx,cy,(R+r)/2,a+gap,a+ang-gap);
      ctx.stroke();
      a+=ang;
    }
  }
  const fs=parseFloat(getComputedStyle(document.body).getPropertyValue("--basefs"))||16;
  const k=fs/16;
  ctx.fillStyle="#8A8F98";ctx.font=`${10*k}px -apple-system,'Hiragino Sans'`;
  ctx.textAlign="center";ctx.fillText(centerLabel,cx,cy-9);
  ctx.fillStyle="#1B2A4A";ctx.font=`700 ${17*k}px -apple-system,'Hiragino Sans'`;
  ctx.fillText(centerValue,cx,cy+13);
}
function drawBars(canvas, labels, incs, exps){
  const dpr=window.devicePixelRatio||1;
  const w=canvas.clientWidth, h=170;
  canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.height=h+"px";
  const ctx=canvas.getContext("2d");ctx.scale(dpr,dpr);
  const max=Math.max(1,...incs,...exps);
  const n=labels.length, slot=w/n, bw=Math.min(16,slot/3.2);
  const base=h-22, top=14;
  const _fs=parseFloat(getComputedStyle(document.body).getPropertyValue("--basefs"))||16;
  ctx.font=`${10*(_fs/16)}px -apple-system,'Hiragino Sans'`;ctx.textAlign="center";
  for(let i=0;i<n;i++){
    const x=slot*i+slot/2;
    const ih=(incs[i]/max)*(base-top), eh=(exps[i]/max)*(base-top);
    ctx.fillStyle="#2E7D5B";ctx.fillRect(x-bw-1.5,base-ih,bw,ih);
    ctx.fillStyle="#BF4E3C";ctx.fillRect(x+1.5,base-eh,bw,eh);
    ctx.fillStyle="#8A8F98";ctx.fillText(labels[i],x,h-7);
  }
  ctx.strokeStyle="#E3E6E0";ctx.beginPath();ctx.moveTo(0,base+0.5);ctx.lineTo(w,base+0.5);ctx.stroke();
}

/* ---------- 画面状態 ---------- */
const S = { tab:"home", month:"", homeMode:"expense", homePeriod:"month", periodYear:"", rangeFrom:"", rangeTo:"", listPeriod:"month", listMonth:"", listYear:"", listFrom:"", listTo:"", filterCats:[], filterMonth:"", assetMonth:"", taxYear:0, docOpenType:"", openCatMgmt:false, openRules:false };

function latestMonth(txs){
  if(!txs.length){const d=new Date();return d.toISOString().slice(0,7);}
  return txs.reduce((m,t)=>t.date>m?t.date:m, txs[0].date).slice(0,7);
}
function shiftMonth(m,delta){
  const [y,mo]=m.split("-").map(Number);
  const d=new Date(y,mo-1+delta,1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
}
const monthLabel = m => m? `${m.slice(0,4)}年${Number(m.slice(5))}月` : "";

/* ---------- 月・年プルダウンの選択肢生成(データのある年月のみ) ---------- */
function monthOptions(current, availMonths){
  const set=new Set(availMonths||[]);
  set.add(current); // 現在選択中の月は必ず含める
  const months=[...set].sort().reverse();
  return months.map(mm=>`<option value="${mm}" ${mm===current?"selected":""}>${monthLabel(mm)}</option>`).join("");
}
function yearOptions(current, availYears){
  const set=new Set(availYears||[]);
  set.add(current);
  return [...set].sort((a,b)=>b-a).map(y=>`<option value="${y}" ${y===current?"selected":""}>${y}年(令和${y-2018})分</option>`).join("");
}

/* ---------- 話して入力(音声テキストの解析) ---------- */
function localToday(shift){
  const x=new Date(); if(shift) x.setDate(x.getDate()+shift);
  return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`;
}
const SPOKEN_KW=[
  [/昼食|ランチ|夕食|夕飯|晩ご飯|晩御飯|朝食|モーニング|外食|食事|ディナー|カフェ|コーヒー|喫茶|ラーメン|そば|うどん|寿司/,"外食"],
  [/食材|食料|食費|スーパー|お酒|弁当|パン|お菓子/,"食費"],
  [/薬局|病院|診察|医院|クリニック|歯医者|歯科|医療|マッサージ|整骨|薬/,"医療・薬"],
  [/ガソリン|給油|駐車場|駐車|高速|車検|洗車|オイル交換/,"車両費"],
  [/日用品|洗剤|シャンプー|ティッシュ|電池|文房具/,"日用品"],
  [/衣料|洋服|服|靴|ズボン|シャツ|クリーニング/,"衣料"],
  [/宿|ホテル|旅行|お土産|温泉|観光/,"旅行"],
  [/書籍|本屋|書店|映画|ゴルフ|宝くじ|ゲーム/,"娯楽"],
  [/寄付|寄附|ふるさと納税/,"寄附・ふるさと納税"],
  [/保険|共済/,"保険"],
  [/電気代|ガス代|水道代|光熱/,"水道光熱"],
];
function parseSpoken(raw){
  let t=(raw||"").replace(/[、。,，．.]/g," ").replace(/\s+/g," ").trim();
  const res={amount:null,category:"",who:"",method:"",dateShift:0};
  if(/一昨日|おととい/.test(t)){res.dateShift=-2;t=t.replace(/一昨日|おととい/g," ");}
  else if(/昨日|きのう/.test(t)){res.dateShift=-1;t=t.replace(/昨日|きのう/g," ");}
  t=t.replace(/今日|きょう/g," ");
  if(/現金/.test(t)){res.method="現金";t=t.replace(/現金/g," ");}
  let m=t.match(/([0-9][0-9,]*)\s*万\s*([0-9][0-9,]*)?\s*円?/);
  if(m){res.amount=parseAmt(m[1])*10000+(m[2]?parseAmt(m[2]):0);t=t.replace(m[0]," ");}
  else if((m=t.match(/([0-9][0-9,]*)\s*円/))){res.amount=parseAmt(m[1]);t=t.replace(m[0]," ");}
  else if((m=t.match(/(?:^| )([0-9][0-9,]{2,})(?: |$)/))){res.amount=parseAmt(m[1]);t=t.replace(m[1]," ");}
  for(const [re,cat] of SPOKEN_KW){
    const b=new RegExp("(^|\\s)(?:"+re.source+")(?=\\s|$)"); // 前後が区切りの単独語
    if(b.test(t)){res.category=cat;t=t.replace(b,"$1");break;}
    if(re.test(t)){res.category=cat;break;} // 店名の一部 → 分類のみ(削除しない)
  }
  res.who=t.replace(/\s+/g," ").trim();
  if(!res.category && res.who){ // 店名から既存ルールで補完
    const hay=norm(res.who);
    for(const r of rulesCache){ if(hay.includes(norm(r.kw))){res.category=r.cat;break;} }
  }
  return res;
}

// 編集(name=null で新規追加)
function openCatEditor(name){
  const existing = name?CAT[name]:null;
  const PALETTE=["#D08C3C","#BF4E3C","#A98F5F","#4E7AA6","#3E8E9E","#6B5B95","#7A6A4F","#5E8C61","#C97FA4","#8E6FB8","#556070","#B89B2E","#3C7A55","#8A8F98","#7B8794","#9AA0A6","#2E7D5B","#3C8C73","#6FA287","#B8BCC2","#C2603A","#2F6E8F","#9C5BA0","#4A7C4E"];
  const curColor = existing? existing.color : PALETTE[0];
  const curType = existing? existing.type : "expense";
  const body=()=>`
    <h3>${name?"カテゴリの編集":"カテゴリの追加"}</h3>
    <div class="frow"><label>名前</label>
      <input type="text" class="txin" id="ceName" value="${name?esc(name):""}" placeholder="例: ペット費" maxlength="12"></div>
    ${name?"":`<div class="frow"><label>区分</label>
      <select id="ceType">
        <option value="expense">支出</option>
        <option value="income">収入</option>
      </select></div>`}
    <div class="frow"><label>色</label>
      <div id="cePalette" style="display:flex;flex-wrap:wrap;gap:8px">
        ${PALETTE.map(col=>`<button class="ceColor" data-col="${col}" style="width:34px;height:34px;border-radius:50%;background:${col};border:3px solid ${col===curColor?'var(--ink)':'transparent'}"></button>`).join("")}
      </div></div>
    ${existing&&existing.taxTag?`<p class="note">このカテゴリは確定申告の「${esc(existing.taxTag)}」集計に使われます。名前は変えても集計対象のままです。</p>`:""}
    <button class="btn" id="ceSave" style="margin-top:6px">保存する</button>
  `;
  showModal(body());
  let selColor=curColor;
  const bindColors=()=>{
    el("modalRoot").querySelectorAll(".ceColor").forEach(b=>b.onclick=()=>{
      selColor=b.dataset.col;
      el("modalRoot").querySelectorAll(".ceColor").forEach(x=>x.style.border="3px solid transparent");
      b.style.border="3px solid var(--ink)";
    });
  };
  bindColors();
  el("ceSave").onclick=async()=>{
    const newName=el("ceName").value.trim();
    if(!newName){ alert("名前を入力してください"); return; }
    const custom=await getCatCustom();
    custom.colors=custom.colors||{}; custom.names=custom.names||{}; custom.adds=custom.adds||[];
    if(!name){
      // 新規追加
      if(CAT[newName]){ alert("同じ名前のカテゴリが既にあります"); return; }
      const type=el("ceType").value;
      custom.adds.push({name:newName,type,color:selColor});
      await saveCatCustom(custom);
      closeModal(); renderTab();
      return;
    }
    // 既存の編集: 色
    custom.colors[newName]=selColor;
    // 名前変更
    if(newName!==name){
      if(CAT[newName]){ alert("同じ名前のカテゴリが既にあります"); return; }
      // 既定カテゴリか追加カテゴリかで保存先が異なる
      const addIdx=custom.adds.findIndex(a=>a.name===name);
      if(addIdx>=0){
        custom.adds[addIdx].name=newName;
        if(custom.colors[name]){ custom.colors[newName]=custom.colors[name]; delete custom.colors[name]; }
        custom.colors[newName]=selColor;
      }else{
        // 既定カテゴリの名前変更: names に 元の既定名→新名 を記録
        // 既に変更済みの場合は元の既定名を辿る
        let defName=name;
        for(const [d,n] of Object.entries(custom.names)){ if(n===name){ defName=d; break; } }
        custom.names[defName]=newName;
        if(custom.colors[name]){ delete custom.colors[name]; }
        custom.colors[newName]=selColor;
      }
      // 既存取引のカテゴリ名を一括置換
      for(const t of await tall("tx")){
        if(t.category===name){ t.category=newName; await tput("tx",t); }
      }
      // 自動分類ルールのカテゴリ参照も置換
      for(const r of await tall("rules")){
        if(r.cat===name){ r.cat=newName; await tput("rules",r); }
      }
      await loadRules();
    }
    await saveCatCustom(custom);
    closeModal(); renderTab();
  };
}

async function renderAssets(){
  const accs=(await tall("accounts")).sort((a,b)=>a.aid-b.aid);
  const bals=await tall("bal");
  const txs=await tall("tx");
  const balMap={}; // month -> aid -> bal(実記録)
  for(const b of bals){ (balMap[b.month]=balMap[b.month]||{})[b.aid]=b; }
  const months=Object.keys(balMap).sort();

  for(const k in byAcc) byAcc[k].sort((a,b)=>a.month.localeCompare(b.month));
  const eff=(mm,aid,noCarry)=>{ // その月時点で有効な残高(引継ぎ込み)
    const arr=byAcc[aid]; if(!arr) return null;
    if(noCarry){ // 引継ぎなし: その月の実記録のみ
      const b=arr.find(x=>x.month===mm);
      return b||null;
    }
    let best=null;
    for(const b of arr){ if(b.month<=mm) best=b; else break; }
    return best;

  const nwOf=mm=>{

    for(const a of accs){const b=eff(mm,a.aid,isAutoLiab(a));if(!b)continue;has=true;
      if(b.month!==mm)carried=true;
      nw += a.kind==="liability" ? -b.amount : b.amount;}
    return has?{nw,carried}:null;
  };

  const nw=nwR?nwR.nw:null, nwPrev=nwPrevR?nwPrevR.nw:null;
  const {inc,exp}=sumMonth(txs,m);

  let allMonths=[];

    // 当月なら今日、過去月ならその月末を「残高時点」とする
    const asof = m===today.slice(0,7) ? today : (today.slice(0,7)>m ? monthEnd : today);

function drawStacked(canvas,gMonths,accs,eff){
  const dpr=window.devicePixelRatio||1;
  const w=canvas.clientWidth,h=200;
  canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.height=h+"px";
  const ctx=canvas.getContext("2d");ctx.scale(dpr,dpr);
  let maxP=1,maxN=0;
  const data=gMonths.map(mm=>{
    const pos=[],neg=[];
    accs.forEach((a,i)=>{const b=eff(mm,a.aid,a.kind==="liability"&&a.name==="カード未払金");if(!b)return;
      (a.kind==="liability"?neg:pos).push({v:b.amount,color:ACC_COLORS[i%ACC_COLORS.length]});});
    maxP=Math.max(maxP,pos.reduce((s,x)=>s+x.v,0));
    maxN=Math.max(maxN,neg.reduce((s,x)=>s+x.v,0));
    return {pos,neg};
  });
  const top=12,bot=20, span=maxP+maxN;
  const base= top + (h-top-bot)*(maxP/span);
  const scale=(h-top-bot)/span;
  const n=gMonths.length, slot=w/n, bw=Math.min(26,slot*0.5);
  ctx.font="10px -apple-system,'Hiragino Sans'";ctx.textAlign="center";
  data.forEach((d,i)=>{
    const x=slot*i+slot/2;
    let y=base;
    for(const s of d.pos){const hh=s.v*scale;ctx.fillStyle=s.color;ctx.fillRect(x-bw/2,y-hh,bw,hh);y-=hh;}
    let y2=base;
    for(const s of d.neg){const hh=s.v*scale;ctx.globalAlpha=.55;ctx.fillStyle=s.color;ctx.fillRect(x-bw/2,y2,bw,hh);ctx.globalAlpha=1;y2+=hh;}
    ctx.fillStyle="#8A8F98";ctx.fillText(monthShort(gMonths[i]),x,h-6);
  });
  ctx.strokeStyle="#E3E6E0";ctx.beginPath();ctx.moveTo(0,base+0.5);ctx.lineTo(w,base+0.5);ctx.stroke();
}

/* 税制ルールは年度別テーブルで管理。改正時はエントリを追加・修正するだけで、
   計算ロジック本体には手を入れない。過去年分はその年のルールで計算される。 */
const TAX_RULES = {
  r2_6: { // 令和2〜6年分(2020〜2024)
    label: "令和2〜6年分",
    salary: [ // [収入上限, 率, 加算] → 控除額 = min(収入, 収入×率+加算)
      [1625000, 0, 550000],
      [1800000, 0.4, -100000],
      [3600000, 0.3, 80000],
      [6600000, 0.2, 440000],
      [8500000, 0.1, 1100000],
      [Infinity, 0, 1950000],
    ],
    base: [ // [合計所得上限, 基礎控除額]
      [24000000, 480000],[24500000, 320000],[25000000, 160000],[Infinity, 0],
    ],
  },
  r7_8: { // 令和7・8年分(2025〜2026): 給与所得控除65万・基礎控除上乗せ特例
    label: "令和7・8年分(基礎控除の上乗せ特例あり)",
    salary: [
      [1900000, 0, 650000],
      [3600000, 0.3, 80000],
      [6600000, 0.2, 440000],
      [8500000, 0.1, 1100000],
      [Infinity, 0, 1950000],
    ],
    base: [
      [1320000, 950000],[3360000, 880000],[4890000, 680000],[6550000, 630000],
      [23500000, 580000],[24000000, 480000],[24500000, 320000],[25000000, 160000],[Infinity, 0],
    ],
  },
  r9: { // 令和9年分以降(現行法ベース)
    label: "令和9年分以降(現行法)",
    salary: [
      [1900000, 0, 650000],
      [3600000, 0.3, 80000],
      [6600000, 0.2, 440000],
      [8500000, 0.1, 1100000],
      [Infinity, 0, 1950000],
    ],
    base: [
      [1320000, 950000],[23500000, 580000],[24000000, 480000],
      [24500000, 320000],[25000000, 160000],[Infinity, 0],
    ],
  },
};
function rulesFor(year){
  return year<=2024 ? TAX_RULES.r2_6 : year<=2026 ? TAX_RULES.r7_8 : TAX_RULES.r9;
}
function salaryIncome(income, R){ // 給与所得(給与所得控除後の金額)を正式な算式で
  if(income<=0) return 0;
  if(income < 1625001) return Math.max(0, income - (R.salary[0][2]||650000));
  const A = Math.floor(income/4/1000)*1000; // 4で割って千円未満切捨
  if(income < 1800000) return A*2.4 + 100000;
  if(income < 3600000) return A*2.8 - 80000;
  if(income < 6600000) return A*3.2 - 440000;
  for(const [cap,r,a] of R.salary) if(income<=cap) return income - Math.min(income, Math.floor(income*r+a));
  return income - 1950000;
}
function pensionDeduction(income, age65){ // 公的年金等控除(他の合計所得1,000万円以下/令和2年分以降共通)
  if(income<=0) return 0;
  if(!age65 && income<=1300000) return 600000;
  if(age65 && income<=3300000) return 1100000;
  if(income<=4100000) return income*0.25+275000;
  if(income<=7700000) return income*0.15+685000;
  if(income<=10000000) return income*0.05+1455000;
  return 1955000;
}
function baseDeduction(gokei, R){ // 基礎控除
  for(const [cap,d] of R.base) if(gokei<=cap) return d;
}
function seihoCalc(p){ // 生命保険料控除(新旧併用の有利判定込み)
  const nw=x=>x<=0?0:x<=20000?x:x<=40000?x/2+10000:x<=80000?x/4+20000:40000;
  const od=x=>x<=0?0:x<=25000?x:x<=50000?x/2+12500:x<=100000?x/4+25000:50000;
  const branch=(n,o)=>Math.max(Math.min(40000,nw(n)+od(o)), od(o));
  return Math.min(120000, Math.floor(branch(p.sn,p.so)+nw(p.kaigo)+branch(p.nn,p.no)));
}
function jishinCalc(j,kyu){ // 地震保険料控除
  const a=Math.min(50000,j);
  const k=kyu<=0?0:kyu<=10000?kyu:kyu<=20000?kyu/2+5000:15000;
  return Math.min(50000,Math.floor(a+k));
}
function taxRate(k){ // 課税所得 → [税額, 限界税率]
  const T=[[1950000,.05,0],[3300000,.10,97500],[6950000,.20,427500],[9000000,.23,636000],
    [18000000,.33,1536000],[40000000,.40,2796000],[Infinity,.45,4796000]];
  for(const [lim,r,d] of T) if(k<lim) return [Math.max(0,Math.floor(k*r-d)), r];
}
function yearAgg(txs,year){ // 家計簿からの年間自動集計
  let med=0,don=0,salNet=0,penNet=0;
  for(const t of txs){
    if(!t.date.startsWith(year)) continue;
    if(t.type==="expense"){
      if(t.taxTag==="医療費") med+=t.amount;
      if(t.taxTag==="寄附金") don+=t.amount;
    }else if(t.type==="income"){
      if(t.category==="給与収入") salNet+=t.amount;
      if(t.category==="年金収入") penNet+=t.amount;
    }
  }
  return {med,don,salNet,penNet};
}
function computeTax(year,v,agg){
  const n=x=>Number(x)||0;
  const R=rulesFor(year);
  const med = (v.medOv!==""&&v.medOv!=null)?n(v.medOv):agg.med;
  const don = (v.donOv!==""&&v.donOv!=null)?n(v.donOv):agg.don;
  const age65 = v.age65!==false;
  const salInc0=salaryIncome(n(v.salary),R);
  const salDed=Math.max(0,n(v.salary)-salInc0); // 表示用の控除額
  let salInc=salInc0;
  const penDed=Math.floor(pensionDeduction(n(v.pension),age65));
  const penInc=Math.max(0,n(v.pension)-penDed);
  const adj=(n(v.salary)>0&&n(v.pension)>0)? // 所得金額調整控除(給与・年金併用)
    Math.max(0,Math.min(salInc,100000)+Math.min(penInc,100000)-100000):0;
  salInc=Math.max(0,salInc-adj);
  const gokei=salInc+penInc;
  const medDed=Math.max(0,Math.min(2000000,(med-n(v.medHoten))-Math.min(100000,Math.floor(gokei*0.05))));
  const seiho=seihoCalc({sn:n(v.sn),so:n(v.so),kaigo:n(v.kaigo),nn:n(v.nn),no:n(v.no)});
  const jishin=jishinCalc(n(v.jishin),n(v.kyuChoki));
  const donDed=don>0?Math.min(don,Math.floor(gokei*0.4)):0;
  const spouse=n(v.spouse);
  const fuyo=n(v.fuyo), other=n(v.other);
  const kiso=baseDeduction(gokei,R);
  const dedTotal=n(v.shaho)+medDed+seiho+jishin+donDed+spouse+fuyo+other+kiso;
  const kazei=Math.max(0,Math.floor((gokei-dedTotal)/1000)*1000);
  const [tax0,rate]=taxRate(kazei);
  const fukko=Math.floor(tax0*0.021);
  const taxTotal=tax0+fukko;
  const diff=taxTotal-n(v.genSen);
  // 住民税所得割の概算 → ふるさと納税限度額の目安
  // (住民税側は扶養控除を一般38万→33万相当に補正)
  const fuyoJ=Math.round(fuyo*33/38);
  const jDed=n(v.shaho)+medDed+Math.min(seiho,70000)+Math.min(Math.floor(jishin/2),25000)
    +(spouse>0?330000:0)+fuyoJ+other+430000;
  const jKazei=Math.max(0,Math.floor((gokei-jDed)/1000)*1000);
  const jWari=Math.max(0,Math.floor(jKazei*0.10)-2500);
  const furuLimit=jWari>0?Math.floor(jWari*0.2/(0.9-rate*1.021))+2000:2000;
  return {salDed,salInc,penDed,penInc,adj,gokei,med,don,medDed,seiho,jishin,donDed,spouse,fuyo,other,kiso,
    dedTotal,kazei,tax0,fukko,taxTotal,diff,jWari,furuLimit,shaho:n(v.shaho),ruleLabel:R.label};
}

    drawDocs();
  };

    </div>`;
  el("modalRoot").innerHTML=`<div class="bigcat-overlay" id="bigcatBg"><div class="bigcat-panel">${body()}</div></div>`;
  const rebind=()=>{
    el("modalRoot").querySelectorAll(".bigcat-chip").forEach(b=>b.onclick=()=>{
      const c=b.dataset.cat; const i=S.filterCats.indexOf(c);
      if(i>=0) S.filterCats.splice(i,1); else S.filterCats.push(c);
      el("modalRoot").querySelector(".bigcat-panel").innerHTML=body(); rebind(); onChange();
    });
    if(el("pkClear")) el("pkClear").onclick=()=>{S.filterCats=[];el("modalRoot").querySelector(".bigcat-panel").innerHTML=body();rebind();onChange();};
    if(el("pkClose")) el("pkClose").onclick=closeModal;
  };
  rebind();
}

function showModal(html){
  el("modalRoot").innerHTML=`<div class="modalbg" id="mbg"><div class="modal">${html}</div></div>`;
  el("mbg").onclick=e=>{if(e.target.id==="mbg")closeModal();};
}
function closeModal(){
  // ビューア用のObjectURLがあれば解放
  if(window.__docURL){URL.revokeObjectURL(window.__docURL);window.__docURL=null;}
  el("modalRoot").innerHTML="";
}
function openDocViewer(blob,name,mime){
  const url=URL.createObjectURL(blob);
  window.__docURL=url;
  const isImg=/^image\//.test(mime)||/\.(png|jpe?g|gif|webp|heic)$/i.test(name);
  const body = isImg
    ? `<img src="${url}" style="width:100%;height:auto;border-radius:8px;display:block">`
    : `<iframe src="${url}" style="width:100%;height:70vh;border:none;border-radius:8px;background:#fff"></iframe>`;
  el("modalRoot").innerHTML=`<div class="modalbg" id="mbg"><div class="modal" style="max-width:760px;width:94%">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <span style="flex:1;min-width:0;font-size:0.875rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(name)}</span>
      <button class="btn sub small" id="docDl" style="padding:4px 12px;font-size:0.75rem;width:auto">保存・共有</button>
      <button class="btn sub small" id="docClose" style="padding:4px 12px;font-size:0.75rem;width:auto">閉じる</button>
    </div>
    ${body}
    <p class="note" style="margin:8px 0 0">表示されない場合は「保存・共有」からファイルアプリに保存して開いてください。</p>
  </div></div>`;
  el("mbg").onclick=e=>{if(e.target.id==="mbg")closeModal();};
  el("docClose").onclick=closeModal;
  el("docDl").onclick=()=>{
    const a=document.createElement("a");
    a.href=url; a.download=name;
    document.body.appendChild(a); a.click(); a.remove();
  };
}
function renderTab(){
  document.querySelectorAll("nav.tabbar button").forEach(b=>
    b.classList.toggle("on",b.dataset.tab===S.tab));
  el("fab").style.display = S.tab==="list" ? "block" : "none";
  el("hdrSub").textContent = {home:"ダッシュボード",assets:"資産・負債",list:"明細",import:"データ取込",tax:"確定申告(概算)",settings:"設定"}[S.tab];
  ({home:renderHome,assets:renderAssets,list:renderList,import:renderImport,tax:renderTax,settings:renderSettings})[S.tab]();
}
document.querySelectorAll("nav.tabbar button").forEach(b=>
  b.onclick=()=>{S.tab=b.dataset.tab;renderTab();});
el("fab").onclick=openManualAdd;

/* ---------- 起動 ---------- */
(async()=>{
  applyFontSize(localStorage.getItem("fontSize")||"normal");
  await openDB();
  await loadCatCustom();
  await seedIfNeeded();
  await loadRules();
  await migrate();
  await migrate3();
  await migrate4();
  await migrate5();
  await migrate6();
  await migrate7();
  await migrate8();
  renderTab();
  if("serviceWorker" in navigator){
    try{ navigator.serviceWorker.register("./sw.js"); }catch(e){}
  }
})();
</script>
