<html lang="ja">

<title>わが家の家計簿</title>
<style>
:root{
  --ink:#1B2A4A; --bg:#F4F6F3; --surface:#FFFFFF; --line:#E3E6E0;
  --expense:#BF4E3C; --income:#2E7D5B; --muted:#8A8F98; --transfer:#9AA0A6;
  --accent:#1B2A4A;
  --radius:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  font-size:16px; line-height:1.55;}
body{padding-bottom:calc(64px + env(safe-area-inset-bottom));}
.num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}
header.app{position:sticky;top:0;z-index:10;background:var(--bg);
  padding:calc(10px + env(safe-area-inset-top)) 16px 8px;
  display:flex;align-items:baseline;justify-content:space-between;}
header.app h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.04em;}
header.app .sub{font-size:12px;color:var(--muted);}
main{padding:0 14px 24px;max-width:680px;margin:0 auto;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:12px;}
.card h2{font-size:13px;color:var(--muted);font-weight:600;margin:0 0 8px;letter-spacing:.06em;}
/* 月ナビ */
.monthnav{display:flex;align-items:center;justify-content:center;gap:18px;margin:6px 0 12px;}
.monthnav button{border:1px solid var(--line);background:var(--surface);border-radius:10px;
  width:38px;height:38px;font-size:18px;color:var(--ink);}
.monthnav .label{font-size:19px;font-weight:700;min-width:140px;text-align:center;letter-spacing:.03em;}
/* 収支サマリ */
.balrow{display:flex;gap:10px;}
.balrow .cell{flex:1;text-align:center;}
.balrow .t{font-size:12px;color:var(--muted);}
.balrow .v{font-size:18px;font-weight:700;}
.v.inc{color:var(--income);} .v.exp{color:var(--expense);}
.bigbal{text-align:center;margin:4px 0 10px;}
.bigbal .v{font-size:34px;font-weight:800;letter-spacing:.01em;}
.bigbal .t{font-size:12px;color:var(--muted);letter-spacing:.1em;}
canvas{display:block;width:100%;}
/* 凡例 */
.legend{display:grid;grid-template-columns:1fr 1fr;gap:4px 14px;margin-top:10px;font-size:13px;}
.legend .li{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.legend .nm{display:flex;align-items:center;gap:7px;min-width:0;}
.legend .nm span.txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dot{width:10px;height:10px;border-radius:3px;flex:0 0 10px;}
.legend .amt{color:var(--muted);}
/* 医療費プログレス */
.prog{height:10px;background:var(--bg);border-radius:6px;overflow:hidden;margin-top:8px;border:1px solid var(--line);}
.prog>i{display:block;height:100%;background:#4E7AA6;border-radius:6px;}
.progmeta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:5px;}
/* 明細リスト */
.txrow{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line);}
.txrow:last-child{border-bottom:none;}
.txrow .cat{flex:0 0 10px;}
.txrow .mid{flex:1;min-width:0;}
.txrow .nm{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.txrow .meta{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.txrow .amt{font-size:15px;font-weight:700;white-space:nowrap;}
.amt.exp{color:var(--expense);} .amt.inc{color:var(--income);} .amt.trf{color:var(--transfer);}
.daterule{font-size:12px;color:var(--muted);background:var(--bg);padding:3px 10px;border-radius:8px;
  margin:10px 0 2px;display:inline-block;}
.filterbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
select,input[type=text],input[type=date],input[type=number]{
  font:inherit;padding:9px 10px;border:1px solid var(--line);border-radius:10px;background:var(--surface);
  color:var(--ink);min-width:0;}
.filterbar select{flex:1;}
/* ボタン */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font:inherit;font-weight:700;
  border:none;border-radius:12px;padding:13px 16px;background:var(--accent);color:#fff;width:100%;}
.btn.sub{background:var(--surface);color:var(--ink);border:1px solid var(--line);font-weight:600;}
.btn.danger{background:#fff;color:var(--expense);border:1px solid var(--expense);}
.btn:active{opacity:.8;}
.btn.small{width:auto;padding:8px 14px;font-size:14px;}
.fab{position:fixed;right:18px;bottom:calc(76px + env(safe-area-inset-bottom));z-index:9;
  width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;font-size:28px;
  border:none;box-shadow:0 4px 14px rgba(27,42,74,.3);}
/* タブバー */
nav.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(255,255,255,.96);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-top:1px solid var(--line);
  display:flex;padding-bottom:env(safe-area-inset-bottom);}
nav.tabbar button{flex:1;background:none;border:none;padding:9px 0 7px;font-size:11px;color:var(--muted);
  display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;}
nav.tabbar button.on{color:var(--ink);font-weight:700;}
nav.tabbar .ic{font-size:21px;line-height:1;}
/* モーダル */
.modalbg{position:fixed;inset:0;background:rgba(20,28,46,.45);z-index:30;display:flex;align-items:flex-end;}
.modal{background:var(--surface);width:100%;max-width:680px;margin:0 auto;border-radius:18px 18px 0 0;
  padding:18px 18px calc(18px + env(safe-area-inset-bottom));max-height:86vh;overflow:auto;}
.modal h3{margin:0 0 12px;font-size:17px;}
.frow{margin-bottom:12px;}
.frow label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;}
.frow select,.frow input{width:100%;}
.chips{display:flex;gap:8px;flex-wrap:wrap;}
.chip{padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:var(--surface);
  font-size:13px;color:var(--ink);}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.checkrow{display:flex;align-items:center;gap:8px;font-size:14px;margin:10px 0;}
.checkrow input{width:20px;height:20px;}
/* 取込 */
.dropmsg{font-size:13px;color:var(--muted);}
.implog{font-size:13px;background:var(--bg);border-radius:10px;padding:10px 12px;margin-top:10px;

.srcbadge{font-size:10px;border:1px solid var(--line);border-radius:5px;padding:1px 5px;color:var(--muted);

/* ルール表 */

.rulerow .kw{flex:1;font-weight:600;word-break:break-all;}
.rulerow .to{color:var(--muted);font-size:12px;}
.rulerow button{border:none;background:none;color:var(--expense);font-size:13px;font-family:inherit;}
.empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:14px;}
.note{font-size:12px;color:var(--muted);margin-top:8px;}
h2.sec{font-size:14px;margin:18px 4px 8px;color:var(--ink);}

<script>
"use strict";
/* ============================================================
   わが家の家計簿 PWA — Phase 1
   取込(PayPay/三井住友銀行CSV) + 自動分類 + 明細 + ダッシュボード
   データは全て端末内(IndexedDB)。外部送信なし。
   ============================================================ */

/* ---------- カテゴリ定義 ---------- */
const CATS = [
  // 支出
  {name:"食費",        type:"expense", color:"#D08C3C"},
  {name:"外食",        type:"expense", color:"#BF4E3C"},
  {name:"日用品",      type:"expense", color:"#A98F5F"},
  {name:"医療・薬",    type:"expense", color:"#4E7AA6", taxTag:"医療費"},
  {name:"水道光熱",    type:"expense", color:"#3E8E9E"},
  {name:"通信・サブスク",type:"expense", color:"#6B5B95"},
  {name:"住居費",      type:"expense", color:"#7A6A4F"},
  {name:"保険",        type:"expense", color:"#5E8C61", taxTag:"保険料"},
  {name:"衣料",        type:"expense", color:"#C97FA4"},
  {name:"旅行",        type:"expense", color:"#8E6FB8"},
  {name:"車両費",      type:"expense", color:"#556070"},
  {name:"娯楽",        type:"expense", color:"#B89B2E"},
  {name:"寄附・ふるさと納税", type:"expense", color:"#3C7A55", taxTag:"寄附金"},
  {name:"カード引落",  type:"expense", color:"#8A8F98"},
  {name:"その他支出",  type:"expense", color:"#9AA0A6"},
  // 収入
  {name:"給与収入",    type:"income",  color:"#2E7D5B"},
  {name:"年金収入",    type:"income",  color:"#3C8C73"},
  {name:"その他収入",  type:"income",  color:"#6FA287"},
  // 振替
  {name:"振替(対象外)", type:"transfer", color:"#B8BCC2"},
];
const CAT = Object.fromEntries(CATS.map(c=>[c.name,c]));

/* ---------- 初期ルール(キーワード → カテゴリ) ---------- */
const SEED_RULES = [
  {kw:"給料",            cat:"給与収入"},
  {kw:"ネンキン",        cat:"年金収入"},
  {kw:"ｺｳｾｲﾈﾝｷﾝ",        cat:"年金収入"},
  {kw:"年金",            cat:"年金収入"},
  {kw:"当選金",          cat:"その他収入"},
  {kw:"PAYPAYｶ-ﾄﾞ",      cat:"振替(対象外)"},   // PayPay明細側で計上するため
  {kw:"PayPayカード",    cat:"振替(対象外)"},
  {kw:"ﾔﾏﾄ ﾀﾀﾞｼ",        cat:"振替(対象外)"},   // 本人間振込
  {kw:"ｾｿﾞﾝ",            cat:"カード引落"},
  {kw:"ﾐﾂｲｽﾐﾄﾓｶ-ﾄﾞ",     cat:"振替(対象外)"},   // Olive明細側で計上するため
  {kw:"ｲｵﾝﾌｲﾅﾝｼﾔﾙ",      cat:"カード引落"},
  {kw:"ｶﾝｻｲﾃﾞﾝﾘﾖｸ",      cat:"水道光熱"},
  {kw:"電力",            cat:"水道光熱"},
  {kw:"ｶﾞｽ",             cat:"水道光熱"},
  {kw:"大阪ガス",        cat:"水道光熱"},
  {kw:"水道",            cat:"水道光熱"},
  {kw:"ｷﾖｳｻｲ",           cat:"保険"},
  {kw:"共済",            cat:"保険"},
  {kw:"保険",            cat:"保険"},
  {kw:"ｶﾝﾘﾋ",            cat:"住居費"},
  {kw:"管理費",          cat:"住居費"},
  {kw:"薬局",            cat:"医療・薬"},
  {kw:"ココカラ",        cat:"医療・薬"},
  {kw:"ドラッグ",        cat:"医療・薬"},
  {kw:"病院",            cat:"医療・薬"},
  {kw:"クリニック",      cat:"医療・薬"},
  {kw:"歯科",            cat:"医療・薬"},
  {kw:"グルマン",        cat:"外食"},
  {kw:"王将",            cat:"外食"},
  {kw:"SOBA",            cat:"外食"},
  {kw:"大元",            cat:"外食"},
  {kw:"たつのや",        cat:"外食"},
  {kw:"サンマルク",      cat:"外食"},
  {kw:"マクドナルド",    cat:"外食"},
  {kw:"珈琲",            cat:"外食"},
  {kw:"カフェ",          cat:"外食"},
  {kw:"Coke ON",         cat:"食費"},
  {kw:"酒店",            cat:"食費"},
  {kw:"スーパー",        cat:"食費"},
  {kw:"イズミヤ",        cat:"食費"},
  {kw:"ローソン",        cat:"食費"},
  {kw:"セブン",          cat:"食費"},
  {kw:"ファミリーマート",cat:"食費"},
  {kw:"ユニクロ",        cat:"衣料"},
  {kw:"ホテル",          cat:"旅行"},
  {kw:"トヨタ",          cat:"車両費"},
  {kw:"ガソリン",        cat:"車両費"},
  {kw:"ENEOS",           cat:"車両費"},
  {kw:"宝くじ",          cat:"娯楽"},
  {kw:"Apple",           cat:"通信・サブスク"},
  {kw:"ふるさと",        cat:"寄附・ふるさと納税"},
  {kw:"さとふる",        cat:"寄附・ふるさと納税"},
  {kw:"ダイソー",        cat:"日用品"},
  {kw:"イトーヨーカドー",cat:"食費"},
  {kw:"イオンリテール",  cat:"食費"},
  {kw:"イオンモール",    cat:"食費"},
  {kw:"イオン　",        cat:"食費"},
  {kw:"おおとりウィングス",cat:"娯楽"},
  {kw:"とんかつ",        cat:"外食"},
  {kw:"ガスト",          cat:"外食"},
  {kw:"びっくりドンキー",cat:"外食"},
  {kw:"はしや",          cat:"外食"},
  {kw:"さん天",          cat:"外食"},
  {kw:"自販機",          cat:"食費"},
  {kw:"トーヨーベンディング",cat:"食費"},

  {kw:"ﾌﾘｺﾐ",            cat:"振替(対象外)"},
];

/* ---------- IndexedDB ---------- */
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const rq = indexedDB.open("kakeibo", 2);
    rq.onupgradeneeded = e=>{
      const d = e.target.result;
      if(!d.objectStoreNames.contains("tx")){
        const s = d.createObjectStore("tx",{keyPath:"id"});
        s.createIndex("date","date");
      }
      if(!d.objectStoreNames.contains("rules"))
        d.createObjectStore("rules",{keyPath:"rid",autoIncrement:true});
      if(!d.objectStoreNames.contains("meta"))
        d.createObjectStore("meta",{keyPath:"k"});
      if(!d.objectStoreNames.contains("accounts"))
        d.createObjectStore("accounts",{keyPath:"aid",autoIncrement:true});
      if(!d.objectStoreNames.contains("bal"))
        d.createObjectStore("bal",{keyPath:"bid"});
    };
    rq.onsuccess = e=>{db=e.target.result;res();};
    rq.onerror = e=>rej(e);
  });
}
function tput(store,obj){return new Promise((res,rej)=>{
  const t=db.transaction(store,"readwrite");t.objectStore(store).put(obj);
  t.oncomplete=res;t.onerror=rej;});}
function tdel(store,key){return new Promise((res,rej)=>{
  const t=db.transaction(store,"readwrite");t.objectStore(store).delete(key);
  t.oncomplete=res;t.onerror=rej;});}
function tall(store){return new Promise((res,rej)=>{
  const rq=db.transaction(store).objectStore(store).getAll();
  rq.onsuccess=()=>res(rq.result);rq.onerror=rej;});}
function tget(store,key){return new Promise((res,rej)=>{
  const rq=db.transaction(store).objectStore(store).get(key);
  rq.onsuccess=()=>res(rq.result);rq.onerror=rej;});}
function tclear(store){return new Promise((res,rej)=>{
  const t=db.transaction(store,"readwrite");t.objectStore(store).clear();
  t.oncomplete=res;t.onerror=rej;});}

async function seedIfNeeded(){
  if(!(await tget("meta","seeded"))){
    for(const r of SEED_RULES) await tput("rules",{kw:r.kw,cat:r.cat});
    await tput("meta",{k:"seeded",v:1});
    await tput("meta",{k:"mig2",v:1}); // 新規インストールは最新ルール込みのため移行不要
  }
  if(!(await tget("meta","seededAcc"))){
    for(const [name,kind] of [["イオン銀行","asset"],["三井住友銀行","asset"],["財布(現金)","asset"]])
      await tput("accounts",{name,kind});
    await tput("meta",{k:"seededAcc",v:1});
  }
}
async function migrate(){
  if(await tget("meta","mig2")) return;
  // Olive明細の取込開始に伴う変更:
  // 1) 銀行側の三井住友カード引落を「振替(対象外)」へ(カード明細側で計上するため)
  const existingKw=new Set();
  for(const r of await tall("rules")){
    existingKw.add(r.kw);
    if(r.kw==="ﾐﾂｲｽﾐﾄﾓｶ-ﾄﾞ" && r.cat!=="振替(対象外)"){
      r.cat="振替(対象外)"; await tput("rules",r);
    }
    if(r.kw==="ガス"){ // 「ガスト」誤マッチ防止: 銀行摘要形式の半角カナへ
      r.kw="ｶﾞｽ"; await tput("rules",r); existingKw.add("ｶﾞｽ");
    }
  }
  // 2) Olive向け店舗ルールを追加(既存キーワードは重複追加しない)
  for(const [kw,cat] of [["ダイソー","日用品"],["イトーヨーカドー","食費"],["イオンリテール","食費"],
    ["イオンモール","食費"],["イオン　","食費"],["おおとりウィングス","娯楽"],["とんかつ","外食"],
    ["ガスト","外食"],["びっくりドンキー","外食"],["はしや","外食"],["さん天","外食"],
    ["自販機","食費"],["トーヨーベンディング","食費"],["道の駅","旅行"]]){
    if(!existingKw.has(kw)) await tput("rules",{kw,cat});
  }
  await loadRules();
  // 3) 手動確定していない明細にルールを再適用(過去のカード引落が振替に変わる)
  for(const t of await tall("tx")){
    if(t.locked) continue;
    const before=t.category+"|"+t.type;
    categorize(t);
    if(t.category+"|"+t.type!==before) await tput("tx",t);
  }
  await tput("meta",{k:"mig2",v:1});
}
async function ensureAccount(name,kind){
  let a=(await tall("accounts")).find(x=>x.name===name);
  if(a) return a;
  await tput("accounts",{name,kind});
  return (await tall("accounts")).find(x=>x.name===name);
}

/* ---------- ユーティリティ ---------- */
const yen = n => "¥" + Math.round(n).toLocaleString("ja-JP");
function fnv(str){ // 簡易ハッシュ(重複判定用)
  let h=0x811c9dc5;
  for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,0x01000193)>>>0;}
  return h.toString(36)+"_"+str.length;
}
function parseAmt(s){
  if(s==null) return null;
  s=String(s).replace(/[",¥\\\s円]/g,"");
  if(s===""||s==="-") return null;
  const n=Number(s); return isNaN(n)?null:n;
}
function normDate(s){ // "2026/4/6" "2026/04/30 04:15:42" → YYYY-MM-DD (+time)
  const m=String(s).trim().match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})(?:[ T](\d{2}:\d{2}(?::\d{2})?))?/);
  if(!m) return null;
  return {date:`${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`, time:m[4]||""};
}
function monthOf(d){return d.slice(0,7);}
function esc(s){return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---------- CSVパーサ(引用符・カンマ対応) ---------- */
function parseCSV(text){
  const rows=[];let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; }
      else cur+=c;
    }else{
      if(c==='"') q=true;
      else if(c===","){row.push(cur);cur="";}
      else if(c==="\n"||c==="\r"){
        if(c==="\r"&&text[i+1]==="\n") i++;
        row.push(cur);cur="";
        if(row.some(x=>x!=="")) rows.push(row);
        row=[];
      }else cur+=c;
    }
  }
  if(cur!==""||row.length){row.push(cur); if(row.some(x=>x!=="")) rows.push(row);}
  return rows;
}
function decodeBuf(buf){
  try{ return new TextDecoder("utf-8",{fatal:true}).decode(buf); }
  catch(e){ return new TextDecoder("shift_jis").decode(buf); }
}

/* ---------- 取込:フォーマット判定と正規化 ---------- */
function detectFormat(header){
  const h = header.join(",");
  if(h.includes("取引番号") && h.includes("取引先")) return "paypay";
  if(h.includes("お引出し") && h.includes("お取り扱い内容")) return "smbc";
  // Olive/Vpass: 1行目が「氏名 様, 4980-09**-..., Ｏｌｉｖｅ／クレジット」形式、または日付始まりの明細行
  if(header.length>=3 && ((header[0]||"").trim().endsWith("様") || /\*\*/.test(header[1]||""))) return "olive";
  if(normDate(header[0]) && header.length>=6 && parseAmt(header[2])!=null) return "olive";
  return null;
}

function normalizeOlive(rows){
  const out=[]; let method="Olive/クレジット"; const seen={};
  for(const c of rows){
    if(!c.length) continue;
    const c0=(c[0]||"").trim();
    const d=normDate(c0);
    if(!d){ // カードヘッダー行(氏名/番号/カード種別)・合計行はスキップ
      if(c.length>=3 && (c0.endsWith("様")||/\*\*/.test(c[1]||"")) && (c[2]||"").trim())
        method=(c[2]||"").trim();
      continue;
    }
    const amount=parseAmt(c[2]) ?? parseAmt(c[5]); // 利用金額(なければお支払金額)
    if(!amount) continue;
    let who=(c[1]||"").trim();
    const mm=who.match(/^(.*?)[／/](ｉＤ|ＮＦＣ|iD|NFC)$/); // 末尾の決済手段表記を除去
    if(mm) who=mm[1].trim();
    const key=[d.date,who,amount].join("|");
    seen[key]=(seen[key]||0)+1; // 同日同額の正当な複数取引に連番付与
    out.push({
      id:"olive:"+fnv(key)+"-"+seen[key],
      date:d.date, time:"", amount, type:"expense",
      counterparty:who, memo:(c[6]||"").trim(),
      method, source:"olive", category:"", taxTag:"", locked:false
    });
  }
  return {txs:out, excluded:0};
}

function normalizePayPay(rows){
  const out=[]; let excluded=0;
  const H=rows[0]; const idx=n=>H.indexOf(n);
  const iDate=idx("取引日"), iOut=H.findIndex(h=>h.startsWith("出金金額")),
        iIn=H.findIndex(h=>h.startsWith("入金金額")), iKind=idx("取引内容"),
        iWho=idx("取引先"), iHow=idx("取引方法"), iNo=idx("取引番号");
  for(let r=1;r<rows.length;r++){
    const c=rows[r]; const kind=c[iKind]||"";
    if(kind.includes("ポイント")){excluded++;continue;}   // ポイント獲得・期限切れは除外
    const d=normDate(c[iDate]); if(!d) continue;
    const outAmt=parseAmt(c[iOut]), inAmt=parseAmt(c[iIn]);
    let type, amount;
    if(outAmt){type = kind.includes("チャージ")?"transfer":"expense"; amount=outAmt;}
    else if(inAmt){type = kind.includes("チャージ")?"transfer":"income"; amount=inAmt;}
    else continue;
    const who=(c[iWho]||"").trim();
    out.push({
      id:"pp:"+ (c[iNo]||fnv(c.join("|"))) + ":" + kind + ":" + amount,
      date:d.date, time:d.time, amount, type,
      counterparty: who.split(" - ")[0] || who || kind,
      memo: who.includes(" - ") ? who : "",
      method:(c[iHow]||"").trim(),
      source:"paypay", category:"", taxTag:"", locked:false
    });
  }
  return {txs:out, excluded};
}

function normalizeSMBC(rows){
  const out=[]; const bals={};
  const H=rows[0]; const idx=n=>H.indexOf(n);
  const iDate=idx("年月日"), iOut=idx("お引出し"), iIn=idx("お預入れ"),
        iDesc=idx("お取り扱い内容"), iBal=idx("残高");
  for(let r=1;r<rows.length;r++){
    const c=rows[r];
    const d=normDate(c[iDate]); if(!d) continue;
    const balV=parseAmt(c[iBal]);
    if(balV!=null){ // 各月の最終取引時点の残高を月末残高として記録
      const m=d.date.slice(0,7);
      if(!bals[m] || d.date>=bals[m].date) bals[m]={date:d.date, amount:balV};
    }
    const outAmt=parseAmt(c[iOut]), inAmt=parseAmt(c[iIn]);
    const desc=(c[iDesc]||"").trim();
    let type, amount;
    if(outAmt){type="expense";amount=outAmt;}
    else if(inAmt){type="income";amount=inAmt;}
    else continue;
    out.push({
      id:"smbc:"+fnv([d.date,amount,desc,c[iBal]||"",type].join("|")),
      date:d.date, time:"", amount, type,
      counterparty:desc, memo:"", method:"口座振替/振込",
      source:"smbc", category:"", taxTag:"", locked:false
    });
  }
  return {txs:out, excluded:0, bals};
}

/* ---------- 自動分類 ---------- */
let rulesCache=[];
async function loadRules(){ rulesCache = await tall("rules"); }
function categorize(tx){
  const hay = (tx.counterparty+" "+tx.memo).toLowerCase();
  for(const r of rulesCache){
    if(hay.includes(r.kw.toLowerCase())){
      tx.category=r.cat;
      const cd=CAT[r.cat];
      if(cd){ tx.type=cd.type; tx.taxTag = tx.taxTag || cd.taxTag || ""; }
      return tx;
    }
  }
  tx.category = tx.type==="income" ? "その他収入" :
                tx.type==="transfer" ? "振替(対象外)" : "その他支出";
  return tx;
}

/* ---------- 取込実行 ---------- */
async function importFiles(files){
  await loadRules();
  const existing = new Set((await tall("tx")).map(t=>t.id));
  const logs=[];
  for(const f of files){
    try{
      const buf=await f.arrayBuffer();
      const text=decodeBuf(buf);
      const rows=parseCSV(text);
      if(!rows.length){logs.push(`✗ ${f.name}: 空のファイル`);continue;}
      const fmt=detectFormat(rows[0]);
      if(!fmt){logs.push(`✗ ${f.name}: 未対応の形式です(PayPay / 三井住友銀行のCSVに対応)`);continue;}
      const res = fmt==="paypay"?normalizePayPay(rows)
                : fmt==="smbc"  ?normalizeSMBC(rows)
                : normalizeOlive(rows);
      const {txs,excluded} = res;
      let added=0,dup=0;
      for(const tx of txs){
        if(existing.has(tx.id)){dup++;continue;}
        categorize(tx);
        await tput("tx",tx);
        existing.add(tx.id);added++;
      }
      const fname = fmt==="paypay"?"PayPay":fmt==="smbc"?"三井住友銀行":"Olive/三井住友カード";
      logs.push(`✓ ${f.name}(${fname})\n　取込 ${added}件 / 重複スキップ ${dup}件`+
        (excluded?` / ポイント行除外 ${excluded}件`:""));
      if(fmt==="smbc" && res.bals && Object.keys(res.bals).length){
        const acc=await ensureAccount("三井住友銀行","asset");
        let nb=0;
        for(const [m,b] of Object.entries(res.bals)){
          const bid=m+":"+acc.aid;
          const ex=await tget("bal",bid);
          if(ex && ex.auto===false) continue; // 手入力済みは上書きしない
          await tput("bal",{bid,month:m,aid:acc.aid,amount:b.amount,auto:true});
          nb++;
        }
        if(nb) logs.push(`　└ 月末残高 ${nb}ヶ月分を「資産」に自動記録`);
      }
    }catch(e){
      logs.push(`✗ ${f.name}: 読込エラー(${e.message||e})`);
    }
  }
  return logs.join("\n");
}

/* ---------- 集計 ---------- */
async function allTx(){ return (await tall("tx")).sort((a,b)=> (b.date+b.time).localeCompare(a.date+a.time)); }
function sumMonth(txs,month){
  let inc=0,exp=0;const byCat={};
  for(const t of txs){
    if(monthOf(t.date)!==month) continue;
    if(t.type==="income") inc+=t.amount;
    else if(t.type==="expense"){exp+=t.amount;byCat[t.category]=(byCat[t.category]||0)+t.amount;}
  }
  return {inc,exp,byCat};
}
function medicalYTD(txs,year){
  let s=0;
  for(const t of txs) if(t.taxTag==="医療費" && t.type==="expense" && t.date.startsWith(year)) s+=t.amount;
  return s;
}

/* ---------- 描画:ドーナツ&棒グラフ(依存ライブラリなし) ---------- */
function drawDonut(canvas, items, centerLabel, centerValue){
  const dpr=window.devicePixelRatio||1;
  const w=canvas.clientWidth, h=220;
  canvas.width=w*dpr; canvas.height=h*dpr; canvas.style.height=h+"px";
  const ctx=canvas.getContext("2d"); ctx.scale(dpr,dpr);
  const cx=w/2, cy=h/2, R=Math.min(w,h)/2-10, r=R*0.66;
  const total=items.reduce((s,i)=>s+i.v,0);
  let a=-Math.PI/2;
  if(total<=0){
    ctx.strokeStyle="#E3E6E0";ctx.lineWidth=R-r;
    ctx.beginPath();ctx.arc(cx,cy,(R+r)/2,0,Math.PI*2);ctx.stroke();
  }else{
    for(const it of items){
      const ang=it.v/total*Math.PI*2;
      const gap=Math.min(0.012, ang*0.25); // 極小セグメントでも開始角<終了角を保証
      ctx.beginPath();
      ctx.strokeStyle=it.color;ctx.lineWidth=R-r;
      ctx.arc(cx,cy,(R+r)/2,a+gap,a+ang-gap);
      ctx.stroke();
      a+=ang;
    }
  }
  ctx.fillStyle="#8A8F98";ctx.font="11px -apple-system,'Hiragino Sans'";
  ctx.textAlign="center";ctx.fillText(centerLabel,cx,cy-12);
  ctx.fillStyle="#1B2A4A";ctx.font="700 21px -apple-system,'Hiragino Sans'";
  ctx.fillText(centerValue,cx,cy+12);
}
function drawBars(canvas, labels, incs, exps){
  const dpr=window.devicePixelRatio||1;
  const w=canvas.clientWidth, h=170;
  canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.height=h+"px";
  const ctx=canvas.getContext("2d");ctx.scale(dpr,dpr);
  const max=Math.max(1,...incs,...exps);
  const n=labels.length, slot=w/n, bw=Math.min(16,slot/3.2);
  const base=h-22, top=14;
  ctx.font="10px -apple-system,'Hiragino Sans'";ctx.textAlign="center";
  for(let i=0;i<n;i++){
    const x=slot*i+slot/2;
    const ih=(incs[i]/max)*(base-top), eh=(exps[i]/max)*(base-top);
    ctx.fillStyle="#2E7D5B";ctx.fillRect(x-bw-1.5,base-ih,bw,ih);
    ctx.fillStyle="#BF4E3C";ctx.fillRect(x+1.5,base-eh,bw,eh);
    ctx.fillStyle="#8A8F98";ctx.fillText(labels[i],x,h-7);
  }
  ctx.strokeStyle="#E3E6E0";ctx.beginPath();ctx.moveTo(0,base+0.5);ctx.lineTo(w,base+0.5);ctx.stroke();
}

function latestMonth(txs){
  if(!txs.length){const d=new Date();return d.toISOString().slice(0,7);}
  return txs.reduce((m,t)=>t.date>m?t.date:m, txs[0].date).slice(0,7);
}
function shiftMonth(m,delta){
  const [y,mo]=m.split("-").map(Number);
  const d=new Date(y,mo-1+delta,1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
}

async function renderList(){

  if(!S.filterMonth) S.filterMonth = months[0]||"";
  const cats=[...new Set(txs.map(t=>t.category))].sort();

    (!S.filterMonth||monthOf(t.date)===S.filterMonth) &&
    (!S.filterCat||t.category===S.filterCat));
  let html=`<div class="filterbar">
    <select id="fM">${["",...months].map(m=>`<option value="${m}" ${m===S.filterMonth?"selected":""}>${m?monthLabel(m):"全期間"}</option>`).join("")}</select>
    <select id="fC"><option value="">全カテゴリ</option>${cats.map(c=>`<option ${c===S.filterCat?"selected":""}>${esc(c)}</option>`).join("")}</select>
  </div><div class="card" style="padding:4px 14px">`;

    <p style="font-size:13px;margin:6px 0"><b>Olive(三井住友カード)</b>:Vpass → ご利用明細 → 「CSVで保存」。お支払い月ごとのファイルを毎月取り込んでください</p>
    <p style="font-size:13px;margin:6px 0"><b>イオン銀行</b>:イオン銀行ダイレクト → 入出金明細照会 → CSVダウンロード。郵送の取引明細PDFは取込できないため、件数が少ない場合は明細画面の「＋」から手入力でも登録できます。</p>

  el("pick").onclick=()=>el("files").click();

}

/* ---------- 設定 ---------- */
async function renderSettings(){
  await loadRules();
  const txs=await tall("tx");
  el("view").innerHTML=`
  <div class="card">
    <h2>自動分類ルール(${rulesCache.length}件)</h2>
    <p class="note" style="margin-top:0">取引先や摘要に含まれる文字で自動分類します。上から順に判定されます。</p>
    <div class="frow" style="display:flex;gap:8px;margin-top:10px">
      <input type="text" id="rKw" placeholder="キーワード(例: ○○薬局)" style="flex:1">
      <select id="rCat">${CATS.map(c=>`<option>${c.name}</option>`).join("")}</select>
    </div>
    <button class="btn sub" id="rAdd">ルールを追加</button>
    <div id="ruleList" style="margin-top:8px"></div>
  </div>
  <div class="card">
    <h2>データ管理</h2>
    <p class="note" style="margin-top:0">登録件数: ${txs.length}件。データはこのiPhoneの中だけに保存されています。機種変更前などにバックアップを保存してください。</p>
    <button class="btn sub" id="reapply">未確定の明細にルールを再適用</button>
    <div style="height:8px"></div>
    <button class="btn sub" id="bkExport">バックアップを書き出す(JSON)</button>
    <div style="height:8px"></div>
    <input type="file" id="bkFile" accept=".json,application/json" style="display:none">
    <button class="btn sub" id="bkImport">バックアップを読み込む</button>
    <div style="height:8px"></div>
    <button class="btn danger" id="wipe">全データを削除</button>
  </div>
  <div class="card"><h2>このアプリについて</h2>
    <p class="note" style="margin-top:0">わが家の家計簿 Phase 1<br>
    取込(PayPay・三井住友銀行CSV)/自動分類/月次ダッシュボード/医療費メモ。<br>
    Phase 2で控除証明書XML取込と税計算、Phase 3でふるさと納税シミュレーションと医療費集計フォーム(Excel)出力を予定。</p></div>`;
  const drawRules=()=>{
    el("ruleList").innerHTML=rulesCache.map(r=>`
      <div class="rulerow"><span class="kw">${esc(r.kw)}</span>
      <span class="to">→ ${esc(r.cat)}</span>
      <button data-rid="${r.rid}">削除</button></div>`).join("");
    el("ruleList").querySelectorAll("button").forEach(b=>b.onclick=async()=>{
      await tdel("rules",Number(b.dataset.rid));
      await loadRules();drawRules();});
  };
  drawRules();
  el("rAdd").onclick=async()=>{
    const kw=el("rKw").value.trim(); if(!kw)return;
    await tput("rules",{kw,cat:el("rCat").value});
    el("rKw").value=""; await loadRules(); drawRules();
  };
  el("reapply").onclick=async()=>{
    await loadRules();
    let n=0;
    for(const t of txs){
      if(t.locked) continue;
      const before=t.category;
      categorize(t);
      if(t.category!==before){await tput("tx",t);n++;}
    }
    alert(`${n}件の分類を更新しました(手動で確定済みの明細は変更しません)`);
  };
  el("bkExport").onclick=async()=>{
    const data={ver:2,exported:new Date().toISOString(),
      tx:await tall("tx"),rules:await tall("rules"),
      accounts:await tall("accounts"),bal:await tall("bal")};
    const blob=new Blob([JSON.stringify(data)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`kakeibo_backup_${data.exported.slice(0,10)}.json`;
    a.click();
  };
  el("bkImport").onclick=()=>el("bkFile").click();
  el("bkFile").onchange=async e=>{
    const f=e.target.files[0]; if(!f)return;
    try{
      const data=JSON.parse(await f.text());
      let n=0;
      for(const t of (data.tx||[])){await tput("tx",t);n++;}
      for(const r of (data.rules||[])){delete r.rid;await tput("rules",r);}
      for(const a of (data.accounts||[])){await tput("accounts",a);} // aidは残高との紐付けのため保持
      for(const b of (data.bal||[])){await tput("bal",b);}
      await loadRules();
      alert(`バックアップから ${n}件の明細を読み込みました`);
      renderTab();
    }catch(err){alert("読み込みに失敗しました: "+err.message);}
  };
  el("wipe").onclick=async()=>{
    if(confirm("全ての明細・ルール・残高記録を削除します。元に戻せません。よろしいですか?")){
      await tclear("tx");await tclear("rules");await tclear("meta");
      await tclear("accounts");await tclear("bal");
      await seedIfNeeded();await loadRules();
      alert("削除しました(初期ルールと口座は再設定済み)");renderTab();
    }
  };
}

/* ---------- 資産・負債 ---------- */
const ACC_COLORS=["#1B2A4A","#3E8E9E","#D08C3C","#5E8C61","#6B5B95","#C97FA4","#556070","#B89B2E"];
const monthShort=m=>Number(m.slice(5))+"月";
async function renderAssets(){
  const accs=(await tall("accounts")).sort((a,b)=>a.aid-b.aid);
  const bals=await tall("bal");
  const txs=await tall("tx");
  const balMap={}; // month -> aid -> bal
  for(const b of bals){ (balMap[b.month]=balMap[b.month]||{})[b.aid]=b; }
  const months=Object.keys(balMap).sort();
  if(!S.assetMonth) S.assetMonth = months[months.length-1] || latestMonth(txs);
  const m=S.assetMonth;

  const nwOf=mm=>{
    const row=balMap[mm]||{}; let nw=0,has=false;
    for(const a of accs){const b=row[a.aid];if(!b)continue;has=true;
      nw += a.kind==="liability" ? -b.amount : b.amount;}
    return has?nw:null;
  };
  const nw=nwOf(m), nwPrev=nwOf(shiftMonth(m,-1));
  const {inc,exp}=sumMonth(txs,m);
  const gap=(nw!=null&&nwPrev!=null)? (nwPrev+inc-exp)-nw : null;
  const gMonths=months.slice(-8);

  el("view").innerHTML=`
  <div class="monthnav">
    <button id="aPrev" aria-label="前の月">‹</button>
    <div class="label">${monthLabel(m)}</div>
    <button id="aNext" aria-label="次の月">›</button>
  </div>
  <div class="card">
    <div class="bigbal">
      <div class="t">純資産(${monthLabel(m)}末)</div>
      <div class="v num">${nw!=null?yen(nw):"—"}</div>
      ${(nw!=null&&nwPrev!=null)?`<div class="note" style="text-align:center">前月比 <b style="color:${nw-nwPrev>=0?'var(--income)':'var(--expense)'}">${nw-nwPrev>=0?"+":""}${yen(nw-nwPrev)}</b></div>`:""}
    </div>
  </div>
  <div class="card">
    <h2>月末残高の入力</h2>
    ${accs.map(a=>{
      const b=(balMap[m]||{})[a.aid];
      return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="flex:1;font-size:14px;font-weight:600">${esc(a.name)}${a.kind==="liability"?' <span class="srcbadge">負債</span>':""}${b&&b.auto?' <span class="srcbadge">自動</span>':""}</span>
        <input type="number" inputmode="numeric" data-aid="${a.aid}" class="balIn" style="width:140px;text-align:right" value="${b?b.amount:""}" placeholder="未入力">
      </div>`;}).join("")}
    <button class="btn" id="balSave">この月の残高を保存</button>
    <div style="height:8px"></div>
    <button class="btn sub" id="accMng">口座の追加・管理</button>
    <p class="note">三井住友銀行はCSV取込時に自動記録されます。手入力で上書きすると、以後その月は手入力が優先されます。</p>
  </div>
  <div class="card">
    <h2>純資産の推移</h2>
    ${gMonths.length?`<canvas id="stk"></canvas>
    <div class="legend">${accs.map((a,i)=>`<div class="li"><div class="nm"><span class="dot" style="background:${ACC_COLORS[i%ACC_COLORS.length]}"></span><span class="txt">${esc(a.name)}${a.kind==="liability"?"(負債)":""}</span></div></div>`).join("")}</div>`
    :`<div class="empty">残高を入力すると推移グラフが表示されます</div>`}
  </div>
  <div class="card">
    <h2>記録漏れチェック(参考)</h2>
    ${gap!=null?`
    <div style="font-size:14px">前月末純資産 ＋ 今月の収支 − 今月末純資産 ＝
      <b class="num" style="color:${gap>0?'var(--expense)':'var(--income)'}">${yen(gap)}</b></div>
    <p class="note">プラスは家計簿に記録されていない支出(現金払いなど)の推定です。カード利用と引落の時期ズレも含まれるため、目安としてご覧ください。</p>`
    :`<p class="note" style="margin:0">当月と前月の残高が揃うと、記録漏れ(現金支出など)の推定が表示されます。</p>`}
  </div>`;
  el("aPrev").onclick=()=>{S.assetMonth=shiftMonth(m,-1);renderAssets();};
  el("aNext").onclick=()=>{S.assetMonth=shiftMonth(m,1);renderAssets();};
  el("balSave").onclick=async()=>{
    for(const inp of document.querySelectorAll(".balIn")){
      const aid=Number(inp.dataset.aid), bid=m+":"+aid, v=inp.value.trim();
      if(v===""){ if(await tget("bal",bid)) await tdel("bal",bid); continue; }
      const n=Number(v); if(isNaN(n)) continue;
      await tput("bal",{bid,month:m,aid,amount:n,auto:false});
    }
    renderAssets();
  };
  el("accMng").onclick=openAccMng;
  if(gMonths.length) drawStacked(el("stk"),gMonths,accs,balMap);
}
function drawStacked(canvas,gMonths,accs,balMap){
  const dpr=window.devicePixelRatio||1;
  const w=canvas.clientWidth,h=200;
  canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.height=h+"px";
  const ctx=canvas.getContext("2d");ctx.scale(dpr,dpr);
  let maxP=1,maxN=0;
  const data=gMonths.map(mm=>{
    const row=balMap[mm]||{}; const pos=[],neg=[];
    accs.forEach((a,i)=>{const b=row[a.aid];if(!b)return;
      (a.kind==="liability"?neg:pos).push({v:b.amount,color:ACC_COLORS[i%ACC_COLORS.length]});});
    maxP=Math.max(maxP,pos.reduce((s,x)=>s+x.v,0));
    maxN=Math.max(maxN,neg.reduce((s,x)=>s+x.v,0));
    return {pos,neg};
  });
  const top=12,bot=20, span=maxP+maxN;
  const base= top + (h-top-bot)*(maxP/span);
  const scale=(h-top-bot)/span;
  const n=gMonths.length, slot=w/n, bw=Math.min(26,slot*0.5);
  ctx.font="10px -apple-system,'Hiragino Sans'";ctx.textAlign="center";
  data.forEach((d,i)=>{
    const x=slot*i+slot/2;
    let y=base;
    for(const s of d.pos){const hh=s.v*scale;ctx.fillStyle=s.color;ctx.fillRect(x-bw/2,y-hh,bw,hh);y-=hh;}
    let y2=base;
    for(const s of d.neg){const hh=s.v*scale;ctx.globalAlpha=.55;ctx.fillStyle=s.color;ctx.fillRect(x-bw/2,y2,bw,hh);ctx.globalAlpha=1;y2+=hh;}
    ctx.fillStyle="#8A8F98";ctx.fillText(monthShort(gMonths[i]),x,h-6);
  });
  ctx.strokeStyle="#E3E6E0";ctx.beginPath();ctx.moveTo(0,base+0.5);ctx.lineTo(w,base+0.5);ctx.stroke();
}
async function openAccMng(){
  const accs=(await tall("accounts")).sort((a,b)=>a.aid-b.aid);
  showModal(`
    <h3>口座の追加・管理</h3>
    <div id="accList">${accs.map(a=>`
      <div class="rulerow"><span class="kw">${esc(a.name)}</span>
      <span class="to">${a.kind==="liability"?"負債":"資産"}</span>
      <button data-aid="${a.aid}">削除</button></div>`).join("")}</div>
    <div style="display:flex;gap:8px;margin:12px 0">
      <input type="text" id="nAccName" placeholder="口座名(例: ○○証券)" style="flex:1">
      <select id="nAccKind"><option value="asset">資産</option><option value="liability">負債</option></select>
    </div>
    <button class="btn" id="nAccAdd">追加する</button>
  `);
  document.querySelectorAll("#accList button").forEach(b=>b.onclick=async()=>{
    if(!confirm("この口座と残高の記録を削除します。よろしいですか?"))return;
    const aid=Number(b.dataset.aid);
    await tdel("accounts",aid);
    for(const bb of await tall("bal")) if(bb.aid===aid) await tdel("bal",bb.bid);
    closeModal();renderAssets();
  });
  el("nAccAdd").onclick=async()=>{
    const name=el("nAccName").value.trim(); if(!name)return;
    await tput("accounts",{name,kind:el("nAccKind").value});
    closeModal();renderAssets();
  };
}

const el=id=>document.getElementById(id);
function showModal(html){
  el("modalRoot").innerHTML=`<div class="modalbg" id="mbg"><div class="modal">${html}</div></div>`;

}

function renderTab(){
  document.querySelectorAll("nav.tabbar button").forEach(b=>
    b.classList.toggle("on",b.dataset.tab===S.tab));
  el("fab").style.display = S.tab==="list" ? "block" : "none";
  el("hdrSub").textContent = {home:"ダッシュボード",assets:"資産・負債",list:"明細",import:"データ取込",settings:"設定"}[S.tab];
  ({home:renderHome,assets:renderAssets,list:renderList,import:renderImport,settings:renderSettings})[S.tab]();
}
document.querySelectorAll("nav.tabbar button").forEach(b=>
  b.onclick=()=>{S.tab=b.dataset.tab;renderTab();});
